<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sign In / Sign Up — Smart House Finder</title>
<meta name="description" content="Create an account or sign in as a student or landlord." />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="/css/styles.css" />
<style>
  .landlord-only { display: none; }
  body.is-landlord.is-signup .landlord-only { display: block; }
  .file-input-wrap {
    border: 2px dashed var(--border, #d1d5db);
    border-radius: 10px;
    padding: 1rem;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
  }
  .file-input-wrap:hover { border-color: var(--primary, #3B82F6); background: rgba(59,130,246,.05); }
  .file-input-wrap input[type="file"] { display: none; }
  .file-input-wrap .file-name { display:block; margin-top:.5rem; font-size:.85rem; color: var(--muted, #6b7280); }
  .checkbox-row { display:flex; align-items:flex-start; gap:.5rem; font-size:.9rem; }
  .checkbox-row input { margin-top:.25rem; }
  .section-title {
    font-size:.8rem; text-transform:uppercase; letter-spacing:.08em;
    color: var(--muted, #6b7280); margin: 1rem 0 .5rem; font-weight:600;
  }
  .grid-2 { display:grid; grid-template-columns: 1fr 1fr; gap:.75rem; }
  @media (max-width: 480px) { .grid-2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div id="header-mount"></div>

<div class="auth-wrap">
  <div class="auth-card">
    <h2 style="text-align:center; margin-bottom:.5rem;">Welcome to Smart House Finder</h2>
    <p style="text-align:center;">Choose your account type to continue.</p>

    <div class="role-toggle" role="tablist">
      <button class="active" data-role="student"><i class="fas fa-user-graduate"></i> Student / Renter</button>
      <button data-role="landlord"><i class="fas fa-key"></i> Landlord</button>
    </div>

    <div class="tabs">
      <button class="active" data-tab="signin">Sign In</button>
      <button data-tab="signup">Sign Up</button>
    </div>

    <form id="authForm" class="form" novalidate>
      <!-- Common -->
      <div class="form-row" id="nameRow" style="display:none;">
        <label for="au-name">Full name</label>
        <input id="au-name" type="text" autocomplete="name" />
        <span class="error"></span>
      </div>
      <div class="form-row">
        <label for="au-email">Email</label>
        <input id="au-email" type="email" autocomplete="email" required />
        <span class="error"></span>
      </div>
      <div class="form-row">
        <label for="au-pass">Password</label>
        <input id="au-pass" type="password" autocomplete="current-password" required />
        <span class="error"></span>
      </div>

      <!-- Landlord-only signup fields -->
      <div class="landlord-only">
        <div class="section-title"><i class="fas fa-id-card"></i> Identity verification</div>

        <div class="grid-2">
          <div class="form-row">
            <label for="ll-phone">Phone number</label>
            <input id="ll-phone" type="tel" autocomplete="tel" placeholder="+1 555 000 0000" />
            <span class="error"></span>
          </div>
          <div class="form-row">
            <label for="ll-dob">Date of birth</label>
            <input id="ll-dob" type="date" />
            <span class="error"></span>
          </div>
        </div>

        <div class="form-row">
          <label for="ll-nid">National ID number</label>
          <input id="ll-nid" type="text" placeholder="e.g. 1234567890" />
          <span class="error"></span>
        </div>

        <div class="form-row">
          <label>Upload copy of National ID (front & back)</label>
          <label class="file-input-wrap" for="ll-nid-file">
            <i class="fas fa-cloud-arrow-up" style="font-size:1.5rem; color:var(--primary,#3B82F6);"></i>
            <div>Click to upload — JPG, PNG or PDF (max 5MB)</div>
            <span class="file-name" id="ll-nid-file-name">No file selected</span>
            <input id="ll-nid-file" type="file" accept="image/*,.pdf" multiple />
          </label>
          <span class="error"></span>
        </div>

        <div class="form-row">
          <label>Selfie holding your ID (recommended)</label>
          <label class="file-input-wrap" for="ll-selfie">
            <i class="fas fa-camera" style="font-size:1.5rem; color:var(--primary,#3B82F6);"></i>
            <div>Click to upload selfie — JPG or PNG</div>
            <span class="file-name" id="ll-selfie-name">No file selected</span>
            <input id="ll-selfie" type="file" accept="image/*" />
          </label>
          <span class="error"></span>
        </div>

        <div class="section-title"><i class="fas fa-building"></i> Property ownership</div>

        <div class="form-row">
          <label for="ll-address">Residential address</label>
          <input id="ll-address" type="text" placeholder="Street, city, country" autocomplete="street-address" />
          <span class="error"></span>
        </div>

        <div class="grid-2">
          <div class="form-row">
            <label for="ll-properties">Number of properties</label>
            <input id="ll-properties" type="number" min="1" max="500" placeholder="1" />
            <span class="error"></span>
          </div>
          <div class="form-row">
            <label for="ll-experience">Years as a landlord</label>
            <input id="ll-experience" type="number" min="0" max="80" placeholder="0" />
            <span class="error"></span>
          </div>
        </div>

        <div class="form-row">
          <label>Proof of property ownership (title deed / utility bill)</label>
          <label class="file-input-wrap" for="ll-deed">
            <i class="fas fa-file-contract" style="font-size:1.5rem; color:var(--primary,#3B82F6);"></i>
            <div>Click to upload — PDF, JPG or PNG (max 10MB)</div>
            <span class="file-name" id="ll-deed-name">No file selected</span>
            <input id="ll-deed" type="file" accept="image/*,.pdf" />
          </label>
          <span class="error"></span>
        </div>

        <div class="section-title"><i class="fas fa-money-check-dollar"></i> Payout & business</div>

        <div class="grid-2">
          <div class="form-row">
            <label for="ll-bank">Bank name</label>
            <input id="ll-bank" type="text" placeholder="e.g. Chase Bank" />
            <span class="error"></span>
          </div>
          <div class="form-row">
            <label for="ll-account">Account / IBAN (last 4)</label>
            <input id="ll-account" type="text" maxlength="34" placeholder="****1234" />
            <span class="error"></span>
          </div>
        </div>

        <div class="form-row">
          <label for="ll-tax">Tax ID / VAT number (optional)</label>
          <input id="ll-tax" type="text" placeholder="Optional but speeds up verification" />
          <span class="error"></span>
        </div>

        <div class="form-row">
          <label for="ll-bio">Short bio (shown on listings)</label>
          <textarea id="ll-bio" rows="3" maxlength="500" placeholder="Tell renters about yourself and your properties..."></textarea>
          <span class="error"></span>
        </div>

        <div class="form-row">
          <label class="checkbox-row">
            <input id="ll-agree" type="checkbox" />
            <span>I confirm the information above is accurate, and I agree to background &amp; ID verification under the <a href="#" style="color:var(--primary,#3B82F6);">Landlord Terms</a> and <a href="#" style="color:var(--primary,#3B82F6);">Privacy Policy</a>.</span>
          </label>
          <span class="error"></span>
        </div>

        <div style="background: rgba(59,130,246,.08); border-left:3px solid var(--primary,#3B82F6); padding:.75rem 1rem; border-radius:6px; font-size:.85rem; margin: .5rem 0 1rem;">
          <i class="fas fa-shield-halved" style="color:var(--primary,#3B82F6);"></i>
          Your documents are encrypted and reviewed by our verification team within 24–48 hours. You can list properties once approved.
        </div>
      </div>

      <button class="btn btn-primary" type="submit" style="width:100%; justify-content:center;" id="submitBtn">Sign In as Student</button>

      <div style="display:flex; align-items:center; gap:.75rem; margin: 1rem 0; color: var(--text-muted); font-size:.85rem;">
        <span style="flex:1; height:1px; background: var(--border);"></span>
        <span>or</span>
        <span style="flex:1; height:1px; background: var(--border);"></span>
      </div>
      <button type="button" id="googleBtn" class="btn btn-outline" style="width:100%; justify-content:center; gap:.6rem;">
        <i class="fab fa-google" style="color:#ea4335;"></i> Continue with Google
      </button>

      <p style="text-align:center; margin-top:1rem; font-size:.9rem;"><a href="#" id="forgotLink">Forgot password?</a></p>
    </form>
  </div>
</div>

<div id="footer-mount"></div>
<script src="/partials.js"></script>
<script src="/js/app.js"></script>
<script>
  let role = 'student';
  let tab = 'signin';
  const submit = document.getElementById('submitBtn');
  const nameRow = document.getElementById('nameRow');

  function refresh() {
    nameRow.style.display = tab === 'signup' ? 'block' : 'none';
    document.body.classList.toggle('is-landlord', role === 'landlord');
    document.body.classList.toggle('is-signup', tab === 'signup');
    const action = tab === 'signin' ? 'Sign In' : (role === 'landlord' ? 'Create Landlord Account' : 'Sign Up');
    const r = role === 'student' ? 'Student' : 'Landlord';
    submit.textContent = tab === 'signin' ? `${action} as ${r}` : action;
  }

  document.querySelectorAll('.role-toggle button').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('.role-toggle button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    role = b.dataset.role;
    refresh();
  }));
  document.querySelectorAll('.tabs button').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('.tabs button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    tab = b.dataset.tab;
    refresh();
  }));

  // File input previews (uploads are optional for now — wired up later)
  function bindFile(inputId, labelId) {
    const inp = document.getElementById(inputId);
    const lbl = document.getElementById(labelId);
    if (!inp || !lbl) return;
    inp.addEventListener('change', () => {
      if (!inp.files || !inp.files.length) { lbl.textContent = 'No file selected'; return; }
      lbl.textContent = Array.from(inp.files).map(f => f.name).join(', ');
    });
  }
  bindFile('ll-nid-file', 'll-nid-file-name');
  bindFile('ll-selfie', 'll-selfie-name');
  bindFile('ll-deed', 'll-deed-name');

  function setError(id, msg) {
    const el = document.getElementById(id);
    if (!el) return;
    el.parentElement.querySelector('.error').textContent = msg || '';
  }

  function waitForAuth() {
    return new Promise((resolve) => {
      if (window.SHF_AUTH?.ready || window.SHF_AUTH?.supabase) return resolve(window.SHF_AUTH);
      window.addEventListener('shf-auth-ready', () => resolve(window.SHF_AUTH), { once: true });
      // Fallback: poll briefly in case the module is still importing
      let tries = 0;
      const t = setInterval(() => {
        if (window.SHF_AUTH?.supabase || ++tries > 50) { clearInterval(t); resolve(window.SHF_AUTH); }
      }, 100);
    });
  }

  function showSuccess(html) {
    document.querySelector('.auth-card').innerHTML = html;
  }

  document.getElementById('googleBtn').addEventListener('click', async () => {
    const a = await waitForAuth();
    if (!a?.lovable) { alert('Auth not ready, please try again.'); return; }
    const result = await a.lovable.auth.signInWithOAuth('google', { redirect_uri: window.location.origin + '/home.html' });
    if (result.error) { alert('Google sign-in failed: ' + (result.error.message || result.error)); return; }
    if (result.redirected) return;
    location.href = '/home.html';
  });

  document.getElementById('forgotLink').addEventListener('click', async (e) => {
    e.preventDefault();
    const email = document.getElementById('au-email').value.trim();
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      setError('au-email', 'Enter your email above first, then click Forgot password.');
      return;
    }
    const a = await waitForAuth();
    const { error } = await a.supabase.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/reset-password.html',
    });
    if (error) { alert('Could not send reset email: ' + error.message); return; }
    alert('Password reset link sent to ' + email + '. Check your inbox.');
  });

  document.getElementById('authForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('au-email');
    const pass = document.getElementById('au-pass');
    const name = document.getElementById('au-name');

    let ok = true;
    document.querySelectorAll('.error').forEach(el => el.textContent = '');

    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) { setError('au-email','Enter a valid email.'); ok = false; }
    if (pass.value.length < 6) { setError('au-pass','Password must be at least 6 characters.'); ok = false; }
    if (tab === 'signup' && name.value.trim().length < 2) { setError('au-name','Enter your full name.'); ok = false; }

    let landlordMeta = {};
    if (tab === 'signup' && role === 'landlord') {
      const phone = document.getElementById('ll-phone').value.trim();
      const dob = document.getElementById('ll-dob').value;
      const nid = document.getElementById('ll-nid').value.trim();
      const address = document.getElementById('ll-address').value.trim();
      const agree = document.getElementById('ll-agree').checked;

      if (!/^[+\d\s\-()]{7,}$/.test(phone)) { setError('ll-phone','Enter a valid phone number.'); ok = false; }
      if (!dob) { setError('ll-dob','Date of birth is required.'); ok = false; }
      else {
        const age = (Date.now() - new Date(dob).getTime()) / (365.25*24*3600*1000);
        if (age < 18) { setError('ll-dob','You must be at least 18 years old.'); ok = false; }
      }
      if (nid.length < 5) { setError('ll-nid','Enter your National ID number.'); ok = false; }
      if (address.length < 5) { setError('ll-address','Enter your residential address.'); ok = false; }
      if (!agree) { setError('ll-agree','You must accept the terms to continue.'); ok = false; }

      landlordMeta = { phone, national_id: nid };
    }

    if (!ok) {
      const firstErr = Array.from(document.querySelectorAll('.error')).find(el => el.textContent);
      if (firstErr) firstErr.scrollIntoView({ behavior:'smooth', block:'center' });
      return;
    }

    const submitBtn = document.getElementById('submitBtn');
    const originalText = submitBtn.textContent;
    submitBtn.disabled = true;
    submitBtn.textContent = 'Please wait…';

    const a = await waitForAuth();

    try {
      if (tab === 'signin') {
        const { error } = await a.supabase.auth.signInWithPassword({
          email: email.value,
          password: pass.value,
        });
        if (error) {
          setError('au-pass', error.message);
          return;
        }
        const nextParam = new URLSearchParams(location.search).get('next');
        if (nextParam) { location.href = nextParam; return; }
        // Wait a tick for role to load
        await new Promise(r => setTimeout(r, 300));
        const newRole = window.SHF_AUTH?.role;
        location.href = newRole === 'landlord' ? '/dashboard.html' : '/listings.html';
        return;
      }

      // Sign up
      const { data, error } = await a.supabase.auth.signUp({
        email: email.value,
        password: pass.value,
        options: {
          emailRedirectTo: window.location.origin + '/home.html',
          data: {
            full_name: name.value.trim(),
            role,
            ...landlordMeta,
          },
        },
      });
      if (error) {
        setError('au-email', error.message);
        return;
      }

      // If email confirmation is required, no session is returned
      const needsConfirm = !data.session;
      showSuccess(`
        <div style="text-align:center; padding:2rem 0;">
          <i class="fas fa-${needsConfirm ? 'envelope-open-text' : 'circle-check'}" style="font-size:3.5rem; color:var(--primary,#3B82F6); margin-bottom:1rem;"></i>
          <h2>${needsConfirm ? 'Check your email' : `Welcome, ${name.value}!`}</h2>
          <p>${needsConfirm
            ? `We sent a confirmation link to <strong>${email.value}</strong>. Click the link to activate your ${role} account.`
            : `You're signed in as a <strong>${role}</strong>.`}</p>
          ${needsConfirm
            ? `<a href="/home.html" class="btn btn-outline" style="margin-top:1rem;">Back to home</a>`
            : `<a href="${role === 'landlord' ? '/dashboard.html' : '/listings.html'}" class="btn btn-primary" style="margin-top:1rem;">${role === 'landlord' ? 'Go to my dashboard' : 'Browse listings'} <i class="fas fa-arrow-right"></i></a>`}
        </div>`);
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = originalText;
    }
  });
  refresh();
</script>
</body>
</html>
