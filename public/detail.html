<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Listing Details — Smart House Finder</title>
<meta name="description" content="View full details, photos and location for this rental property." />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="/css/styles.css" />
<style>
  .detail-wrap { margin-top: var(--header-h); padding: 2rem 0 4rem; }
  .detail-grid { display:grid; grid-template-columns: 1.4fr 1fr; gap:2rem; }
  @media (max-width: 900px) { .detail-grid { grid-template-columns: 1fr; } }
  .hero-img { width:100%; border-radius:14px; overflow:hidden; aspect-ratio: 16/10; object-fit:cover; box-shadow: 0 10px 30px -12px rgba(0,0,0,.25); }
  .thumb-row { display:grid; grid-template-columns: repeat(4,1fr); gap:.6rem; margin-top:.75rem; }
  .thumb-row img { width:100%; aspect-ratio:1; object-fit:cover; border-radius:10px; cursor:pointer; opacity:.85; transition:opacity .2s, transform .2s; }
  .thumb-row img:hover { opacity:1; transform: scale(1.03); }
  .info-card { background: var(--surface); border:1px solid var(--border); border-radius:14px; padding:1.5rem; }
  .info-card h2 { margin:0 0 .25rem; font-size:1.4rem; }
  .price-big { font-size:2rem; font-weight:700; color: var(--primary); margin:.75rem 0; }
  .price-big small { font-size:.9rem; color: var(--text-muted); font-weight:400; }
  .meta-row { display:flex; flex-wrap:wrap; gap:1rem 1.5rem; margin:1rem 0; color: var(--text-muted); font-size:.95rem; }
  .meta-row i { color: var(--primary); margin-right:.35rem; }
  .feature-list { list-style:none; padding:0; margin:1rem 0; display:grid; grid-template-columns:1fr 1fr; gap:.5rem; }
  .feature-list li { font-size:.9rem; color:var(--text-muted); }
  .feature-list i { color: var(--primary); margin-right:.4rem; }
  #detailMap { height: 300px; border-radius:12px; margin-top:1rem; }
  .back-link { display:inline-flex; align-items:center; gap:.4rem; margin-bottom:1rem; color:var(--primary); text-decoration:none; font-weight:500; }
  .back-link:hover { text-decoration:underline; }
  .not-found { text-align:center; padding:4rem 1rem; }
</style>
</head>
<body>
<div id="header-mount"></div>

<div class="detail-wrap">
  <div class="container">
    <a href="/listings.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to listings</a>
    <div id="detailRoot"></div>
  </div>
</div>

<div id="footer-mount"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/js/data.js"></script>
<script src="/partials.js"></script>
<script src="/js/app.js"></script>
<script>
  const id = +new URLSearchParams(location.search).get('id');
  const l = SHF_LISTINGS.find(x => x.id === id);
  const root = document.getElementById('detailRoot');

  if (!l) {
    root.innerHTML = `<div class="not-found"><h2>Listing not found</h2><p>The property you're looking for doesn't exist or has been removed.</p><a href="/listings.html" class="btn btn-primary">Browse all listings</a></div>`;
  } else {
    document.title = `${l.title} — Smart House Finder`;
    const gallery = [l.img,
      `https://picsum.photos/seed/${l.id}a/800/600`,
      `https://picsum.photos/seed/${l.id}b/800/600`,
      `https://picsum.photos/seed/${l.id}c/800/600`];
    root.innerHTML = `
      <div class="detail-grid">
        <div>
          <img id="heroImg" class="hero-img" data-lightbox src="${gallery[0]}" alt="${l.title}" />
          <div class="thumb-row">
            ${gallery.map(g => `<img src="${g}" alt="thumbnail" data-thumb />`).join('')}
          </div>
          <div class="info-card" style="margin-top:1.5rem;">
            <h3 style="margin-top:0;">About this property</h3>
            <p>${l.desc}</p>
            <ul class="feature-list">
              <li><i class="fas fa-wifi"></i> High-speed Wi-Fi</li>
              <li><i class="fas fa-bolt"></i> Backup power</li>
              <li><i class="fas fa-shield-halved"></i> 24/7 security</li>
              <li><i class="fas fa-water"></i> Reliable water supply</li>
              <li><i class="fas fa-couch"></i> Furnished</li>
              <li><i class="fas fa-car"></i> Parking available</li>
            </ul>
            <div id="detailMap"></div>
          </div>
        </div>
        <aside>
          <div class="info-card">
            <span class="badge">${l.tag}</span>
            <h2 style="margin-top:.6rem;">${l.title}</h2>
            <div style="color:var(--text-muted);"><i class="fas fa-location-dot"></i> ${l.neighborhood ? l.neighborhood + ', ' : ''}${l.city}</div>
            <div class="price-big">${SHF.formatPrice(l.price)}<small> / month</small></div>
            <div class="meta-row">
              <span><i class="fas fa-bed"></i> ${l.beds} bed${l.beds>1?'s':''}</span>
              <span><i class="fas fa-bath"></i> ${l.baths} bath${l.baths>1?'s':''}</span>
              <span><i class="fas fa-ruler-combined"></i> ${l.area}</span>
            </div>
            <button class="btn btn-primary" style="width:100%; margin-top:.5rem;" onclick="alert('Request sent to landlord. They will contact you shortly.')"><i class="fas fa-paper-plane"></i> Request a viewing</button>
            <button class="btn btn-outline" style="width:100%; margin-top:.6rem;" onclick="alert('Saved to favourites.')"><i class="far fa-heart"></i> Save to favourites</button>
            <hr style="border:none; border-top:1px solid var(--border); margin:1.25rem 0;" />
            <h4 style="margin:0 0 .5rem;">Listed by</h4>
            <div style="display:flex; align-items:center; gap:.75rem;">
              <img src="https://i.pravatar.cc/80?img=${(l.id*7)%70}" alt="Landlord" style="width:48px; height:48px; border-radius:50%;" />
              <div>
                <div style="font-weight:600;">Verified Landlord</div>
                <div style="font-size:.85rem; color:var(--text-muted);"><i class="fas fa-circle-check" style="color:var(--primary);"></i> ID verified</div>
              </div>
            </div>
          </div>
        </aside>
      </div>`;

    document.querySelectorAll('[data-thumb]').forEach(t => t.addEventListener('click', () => {
      document.getElementById('heroImg').src = t.src;
    }));

    const m = L.map('detailMap').setView([l.lat, l.lng], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap', maxZoom:19 }).addTo(m);
    L.marker([l.lat, l.lng]).addTo(m).bindPopup(`<strong>${l.title}</strong><br/>${SHF.formatPrice(l.price)}/mo`).openPopup();
  }
</script>
</body>
</html>
