<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script>
  (function(){
    try {
      if (!JSON.parse(localStorage.getItem('shf-user') || 'null')) {
        var next = encodeURIComponent(location.pathname + location.search);
        location.replace('/login.html?next=' + next);
      }
    } catch(e){ location.replace('/login.html'); }
  })();
</script>
<title>Listing Details — Smart House Finder</title>
<meta name="description" content="View full details, photos and location for this rental property." />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="/css/styles.css" />
<style>
  .detail-wrap { margin-top: var(--header-h); padding: 2rem 0 4rem; }
  .detail-grid { display:grid; grid-template-columns: 1.4fr 1fr; gap:2rem; }
  @media (max-width: 900px) { .detail-grid { grid-template-columns: 1fr; } }
  .hero-img { width:100%; border-radius:14px; overflow:hidden; aspect-ratio: 16/10; object-fit:cover; box-shadow: 0 10px 30px -12px rgba(0,0,0,.25); background:#f1f5f9; }
  .thumb-row { display:grid; grid-template-columns: repeat(4,1fr); gap:.6rem; margin-top:.75rem; }
  .thumb-row img { width:100%; aspect-ratio:1; object-fit:cover; border-radius:10px; cursor:pointer; opacity:.85; transition:opacity .2s, transform .2s; }
  .thumb-row img:hover { opacity:1; transform: scale(1.03); }
  .info-card { background: var(--surface); border:1px solid var(--border); border-radius:14px; padding:1.5rem; }
  .info-card h2 { margin:0 0 .25rem; font-size:1.4rem; }
  .price-big { font-size:2rem; font-weight:700; color: var(--primary); margin:.75rem 0; }
  .price-big small { font-size:.9rem; color: var(--text-muted); font-weight:400; }
  .meta-row { display:flex; flex-wrap:wrap; gap:1rem 1.5rem; margin:1rem 0; color: var(--text-muted); font-size:.95rem; }
  .meta-row i { color: var(--primary); margin-right:.35rem; }
  .feature-list { list-style:none; padding:0; margin:1rem 0; display:grid; grid-template-columns:1fr 1fr; gap:.5rem; }
  .feature-list li { font-size:.9rem; color:var(--text-muted); }
  .feature-list i { color: var(--primary); margin-right:.4rem; }
  #detailMap { height: 300px; border-radius:12px; margin-top:1rem; }
  .back-link { display:inline-flex; align-items:center; gap:.4rem; margin-bottom:1rem; color:var(--primary); text-decoration:none; font-weight:500; }
  .back-link:hover { text-decoration:underline; }
  .not-found { text-align:center; padding:4rem 1rem; }
</style>
</head>
<body>
<div id="header-mount"></div>

<div class="detail-wrap">
  <div class="container">
    <a href="/listings.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to listings</a>
    <div id="detailRoot"></div>
  </div>
</div>

<div id="footer-mount"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/js/cloud.js"></script>
<script src="/js/data.js"></script>
<script src="/partials.js"></script>
<script src="/js/app.js"></script>
<script>
  const rawId = new URLSearchParams(location.search).get('id');
  const id = /^\d+$/.test(rawId) ? +rawId : rawId;
  const root = document.getElementById('detailRoot');
  let rendered = false;

  function escapeHtml(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function renderNotFound(){
    root.innerHTML = `<div class="not-found"><h2>Listing not found</h2><p>The property you're looking for doesn't exist or has been removed.</p><a href="/listings.html" class="btn btn-primary">Browse all listings</a></div>`;
  }

  const AMENITY_ICONS = {
    'Wi-Fi':'fa-wifi','Parking':'fa-square-parking','Security':'fa-shield-halved',
    'Water tank':'fa-water','Generator':'fa-bolt','Air conditioning':'fa-snowflake',
    'Kitchen':'fa-utensils','Laundry':'fa-soap','Pet friendly':'fa-paw',
    'Garden':'fa-tree','Balcony':'fa-house-chimney','Furnished':'fa-couch'
  };

  async function renderDetail(l){
    rendered = true;
    document.title = `${l.title} — Smart House Finder`;
    const gallery = (Array.isArray(l.image_urls) && l.image_urls.length) ? l.image_urls : (l.img ? [l.img] : []);
    const heroSrc = gallery[0] || 'https://placehold.co/900x600?text=No+photo';

    const amenitiesHtml = (Array.isArray(l.amenities) && l.amenities.length)
      ? `<ul class="feature-list">${l.amenities.map(a => {
          const ic = AMENITY_ICONS[a] || 'fa-circle-check';
          return `<li><i class="fas ${ic}"></i> ${escapeHtml(a)}</li>`;
        }).join('')}</ul>`
      : `<p style="color:var(--text-muted); font-style:italic;">No amenities listed.</p>`;

    const thumbsHtml = gallery.length > 1
      ? `<div class="thumb-row">${gallery.slice(0,8).map(g => `<img src="${escapeHtml(g)}" alt="thumbnail" data-thumb />`).join('')}</div>`
      : '';

    root.innerHTML = `
      <div class="detail-grid">
        <div>
          <img id="heroImg" class="hero-img" src="${escapeHtml(heroSrc)}" alt="${escapeHtml(l.title)}" />
          ${thumbsHtml}
          ${l.video_url ? `<div class="info-card" style="margin-top:1.5rem;">
            <h3 style="margin-top:0;"><i class="fas fa-video"></i> Video tour</h3>
            <video src="${escapeHtml(l.video_url)}" controls preload="metadata" style="width:100%; max-height:480px; border-radius:8px; background:#000;"></video>
          </div>` : ''}
          <div class="info-card" style="margin-top:1.5rem;">
            <h3 style="margin-top:0;">About this property</h3>
            <p>${escapeHtml(l.desc) || '<em>No description provided.</em>'}</p>
            <h4 style="margin:1.25rem 0 .5rem;">Amenities</h4>
            ${amenitiesHtml}
            <div id="detailMap"></div>
          </div>

          <div class="info-card" id="roommateSection" style="margin-top:1.5rem;">
            <div style="display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap;">
              <h3 style="margin:0;">🤝 Roommate Requests</h3>
              <button id="findRoommateBtn" class="btn btn-primary"><i class="fas fa-hand"></i> 🙋‍♂️ Find a Roommate to Split Cost</button>
            </div>
            <p style="color:var(--text-muted); margin:.5rem 0 1rem;">Students looking to co-tenant this property.</p>
            <div id="roommateList" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:.85rem;">
              <div style="color:var(--text-muted); font-size:.9rem;">Loading…</div>
            </div>
          </div>
        </div>
        <aside>
          <div class="info-card">
            <div style="display:flex; gap:.5rem; flex-wrap:wrap;">
              <span class="badge">${escapeHtml(l.tag || 'Property')}</span>
              ${SHF.occupancyBadge(l.occupancy)}
            </div>
            <h2 style="margin-top:.6rem;">${escapeHtml(l.title)}</h2>
            <div style="color:var(--text-muted);"><i class="fas fa-location-dot"></i> ${escapeHtml(l.neighborhood ? l.neighborhood + ', ' : '')}${escapeHtml(l.city || '')}</div>
            <div class="price-big">${SHF.formatPrice(l.price)}<small> / month</small></div>
            <div class="meta-row">
              <span><i class="fas fa-bed"></i> ${l.beds||0} bed${l.beds>1?'s':''}</span>
              <span><i class="fas fa-bath"></i> ${l.baths||0} bath${l.baths>1?'s':''}</span>
              ${l.size_sqm ? `<span><i class="fas fa-ruler-combined"></i> ${l.size_sqm} sqm</span>` : ''}
              ${l.furnishing ? `<span><i class="fas fa-couch"></i> ${escapeHtml(l.furnishing)}</span>` : ''}
            </div>
            ${SHF.proximityBadges(l.lat, l.lng)}
            <button id="requestViewingBtn" class="btn btn-primary" style="width:100%; margin-top:.5rem;" ${l.occupancy==='occupied'?'disabled':''}>
              <i class="fas fa-paper-plane"></i> ${l.occupancy==='occupied'?'Property is occupied':'Request a viewing'}
            </button>
            <hr style="border:none; border-top:1px solid var(--border); margin:1.25rem 0;" />
            <h4 style="margin:0 0 .5rem;">Listed by</h4>
            <a id="landlordBlock" href="javascript:void(0)" style="display:flex; align-items:center; gap:.75rem; text-decoration:none; color:inherit; padding:.5rem; border-radius:10px; transition:background .15s;" onmouseover="this.style.background='rgba(59,130,246,.08)'" onmouseout="this.style.background='transparent'">
              <div style="width:48px; height:48px; border-radius:50%; background:#e5e7eb; display:flex; align-items:center; justify-content:center;"><i class="fas fa-user" style="color:#9ca3af;"></i></div>
              <div>
                <div style="font-weight:600;">Loading…</div>
                <div style="font-size:.85rem; color:var(--text-muted);"><i class="fas fa-circle-check" style="color:var(--primary);"></i> Verified Landlord</div>
              </div>
            </a>

          </div>
        </aside>
      </div>`;

    document.querySelectorAll('[data-thumb]').forEach(t => t.addEventListener('click', () => {
      document.getElementById('heroImg').src = t.src;
    }));

    if (l.lat != null && l.lng != null) {
      const m = L.map('detailMap').setView([l.lat, l.lng], 14);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap', maxZoom:19 }).addTo(m);
      L.marker([l.lat, l.lng]).addTo(m).bindPopup(`<strong>${escapeHtml(l.title)}</strong><br/>${SHF.formatPrice(l.price)}/mo`).openPopup();
    } else {
      const mapEl = document.getElementById('detailMap');
      if (mapEl) mapEl.style.display = 'none';
    }

    // === Landlord block (DB listings only) ===
    if (l.isDb && l.landlord_id) {
      try {
        const sb = await window.SHFCloud.ready;
        const { data: ll } = await sb.rpc('get_landlord_public', { _landlord_id: l.landlord_id });
        const row = Array.isArray(ll) && ll[0];
        if (row) {
          const name = escapeHtml(row.full_name || 'Verified Landlord');
          const av = row.selfie_url
            ? `<img src="${escapeHtml(row.selfie_url)}" alt="${name}" style="width:48px;height:48px;border-radius:50%;object-fit:cover;" />`
            : `<div style="width:48px; height:48px; border-radius:50%; background:#e5e7eb; display:flex; align-items:center; justify-content:center;"><i class="fas fa-user" style="color:#9ca3af;"></i></div>`;
          const block = document.getElementById('landlordBlock');
          block.href = `/landlord.html?id=${encodeURIComponent(l.landlord_id)}`;
          block.innerHTML = `
            ${av}
            <div>
              <div style="font-weight:600;">${name} <i class="fas fa-arrow-right" style="font-size:.7rem; color:var(--primary); margin-left:.25rem;"></i></div>
              <div style="font-size:.85rem; color:var(--text-muted);"><i class="fas fa-circle-check" style="color:var(--primary);"></i> Verified Landlord · ${row.property_count||0} listing${row.property_count==1?'':'s'}</div>
            </div>`;
        }
      } catch (e) { console.warn('landlord fetch', e); }
    } else {
      document.getElementById('landlordBlock').innerHTML = `
        <div style="width:48px; height:48px; border-radius:50%; background:#e5e7eb; display:flex; align-items:center; justify-content:center;"><i class="fas fa-user" style="color:#9ca3af;"></i></div>
        <div>
          <div style="font-weight:600;">Verified Landlord</div>
          <div style="font-size:.85rem; color:var(--text-muted);"><i class="fas fa-circle-check" style="color:var(--primary);"></i> ID verified</div>
        </div>`;
    }


    // === Request viewing ===
    document.getElementById('requestViewingBtn').addEventListener('click', async () => {
      const cached = JSON.parse(localStorage.getItem('shf-user') || 'null');
      if (!cached) { window.toast.error('Please sign in first.'); location.href = '/login.html?next=' + encodeURIComponent(location.pathname + location.search); return; }
      // Verification gate
      const sb = await window.SHFCloud.ready;
      const { data: prof } = await sb.from('profiles').select('phone, verification_status').eq('id', cached.id).maybeSingle();
      if (!prof || prof.verification_status !== 'approved') {
        if (confirm('You need to verify your identity before requesting a viewing. Go to sign-up to complete verification now?')) {
          location.href = '/login.html';
        }
        return;
      }
      if (!l.isDb || !l.landlord_id) {
        alert('Request sent. The landlord will contact you shortly.');
        return;
      }
      const defaultPhone = (prof && prof.phone) || '+255';
      const phone = prompt('Enter your phone number so the landlord can call you back:', defaultPhone);
      if (!phone) return;
      if (!/^\+255\d{9}$/.test(phone.trim())) {
        window.toast.error('Phone must be in the format +255XXXXXXXXX (9 digits after +255).');
        return;
      }
      const msg = prompt('Optional short message to the landlord (e.g. preferred viewing time):', '') || null;
      const { error } = await sb.from('viewing_requests').insert({
        property_id: l.dbId,
        renter_id: cached.id,
        landlord_id: l.landlord_id,
        contact_phone: phone.trim(),
        message: msg,
      });
      if (error) { window.toast.error(error.message); return; }
      window.toast.success('Viewing request sent to the landlord!');
    });

    // === Hide student-only sections from non-students ===
    const _u = JSON.parse(localStorage.getItem('shf-user') || 'null');
    if (!_u || _u.role !== 'student') {
      const rm = document.getElementById('roommateSection');
      if (rm) rm.style.display = 'none';
    }

    // === Roommate Requests ===
    (async function initRoommates(){
      const propertyKey = String(l.id);
      const listEl = document.getElementById('roommateList');
      const btn = document.getElementById('findRoommateBtn');
      const cached = JSON.parse(localStorage.getItem('shf-user') || 'null');

      function renderCards(rows){
        if (!rows || !rows.length){
          listEl.innerHTML = '<div style="color:var(--text-muted); font-size:.9rem;">No one has requested a roommate here yet. Be the first!</div>';
          return;
        }
        listEl.innerHTML = rows.map(r => {
          const p = r.profiles || {};
          const name = escapeHtml(p.full_name || 'Student');
          const clean = escapeHtml(p.cleanliness_preference || '—');
          const sleep = escapeHtml(p.sleep_schedule || '—');
          const bio = escapeHtml(p.bio || 'No bio yet.');
          const av = `https://i.pravatar.cc/64?u=${encodeURIComponent(r.student_id)}`;
          return `<div style="border:1px solid var(--border); border-radius:12px; padding:.9rem; background:var(--surface);">
            <div style="display:flex; align-items:center; gap:.6rem; margin-bottom:.5rem;">
              <img src="${av}" alt="" style="width:42px;height:42px;border-radius:50%;" />
              <div style="font-weight:600;">${name}</div>
            </div>
            <div style="font-size:.82rem; color:var(--text-muted); display:flex; flex-wrap:wrap; gap:.4rem; margin-bottom:.5rem;">
              <span>🧽 ${clean}</span><span>🌙 ${sleep}</span>
            </div>
            <div style="font-size:.88rem; line-height:1.35;">${bio}</div>
          </div>`;
        }).join('');
      }

      try {
        const sb = await window.SHFCloud.ready;
        async function refresh(){
          const { data, error } = await sb
            .from('roommate_requests')
            .select('id, student_id, status, created_at, profiles:student_id ( full_name, cleanliness_preference, sleep_schedule, bio )')
            .eq('property_key', propertyKey)
            .eq('status', 'searching')
            .order('created_at', { ascending: false });
          if (error){ listEl.innerHTML = '<div style="color:var(--text-muted); font-size:.9rem;">Could not load roommate requests.</div>'; return; }
          renderCards(data);
          if (cached && data && data.some(r => r.student_id === cached.id)){
            btn.innerHTML = '<i class="fas fa-check"></i> You\'re on the roommate list';
            btn.disabled = true;
            btn.classList.add('btn-outline'); btn.classList.remove('btn-primary');
          }
        }
        btn.addEventListener('click', async () => {
          const { data: { session } } = await sb.auth.getSession();
          if (!session){ window.toast.error('Please sign in to request a roommate.'); return; }
          openRoommateModal(session.user.id);
        });

        async function openRoommateModal(userId){
          // Prefill from existing profile
          const { data: prof } = await sb.from('profiles')
            .select('cleanliness_preference, sleep_schedule, bio')
            .eq('id', userId).maybeSingle();
          const overlay = document.createElement('div');
          overlay.style.cssText = 'position:fixed; inset:0; background:rgba(0,0,0,.5); display:flex; align-items:center; justify-content:center; z-index:9999; padding:1rem;';
          overlay.innerHTML = `
            <div style="background:var(--surface, #fff); border-radius:14px; padding:1.5rem; max-width:460px; width:100%; box-shadow:0 20px 60px rgba(0,0,0,.3);">
              <h3 style="margin:0 0 .25rem;">🙋 Find a Roommate</h3>
              <p style="margin:0 0 1rem; color:var(--text-muted); font-size:.9rem;">Tell others a bit about your living style so they can match with you.</p>
              <label style="display:block; font-weight:600; font-size:.85rem; margin-bottom:.25rem;">Cleanliness preference</label>
              <select id="rm_clean" class="form-control" style="width:100%; padding:.55rem; border:1px solid var(--border); border-radius:8px; margin-bottom:.85rem;">
                <option value="">Select…</option>
                <option ${prof?.cleanliness_preference==='High'?'selected':''}>High</option>
                <option ${prof?.cleanliness_preference==='Medium'?'selected':''}>Medium</option>
                <option ${prof?.cleanliness_preference==='Flexible'?'selected':''}>Flexible</option>
              </select>
              <label style="display:block; font-weight:600; font-size:.85rem; margin-bottom:.25rem;">Sleep schedule</label>
              <select id="rm_sleep" class="form-control" style="width:100%; padding:.55rem; border:1px solid var(--border); border-radius:8px; margin-bottom:.85rem;">
                <option value="">Select…</option>
                <option ${prof?.sleep_schedule==='Early Bird'?'selected':''}>Early Bird</option>
                <option ${prof?.sleep_schedule==='Night Owl'?'selected':''}>Night Owl</option>
                <option ${prof?.sleep_schedule==='Flexible'?'selected':''}>Flexible</option>
              </select>
              <label style="display:block; font-weight:600; font-size:.85rem; margin-bottom:.25rem;">Short bio</label>
              <textarea id="rm_bio" rows="3" maxlength="280" placeholder="A few words about you…" style="width:100%; padding:.55rem; border:1px solid var(--border); border-radius:8px; resize:vertical; font-family:inherit;">${escapeHtml(prof?.bio || '')}</textarea>
              <div style="display:flex; gap:.5rem; justify-content:flex-end; margin-top:1rem;">
                <button id="rm_cancel" class="btn btn-outline">Cancel</button>
                <button id="rm_send" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Send Request</button>
              </div>
            </div>`;
          document.body.appendChild(overlay);
          const close = () => overlay.remove();
          overlay.querySelector('#rm_cancel').addEventListener('click', close);
          overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
          overlay.querySelector('#rm_send').addEventListener('click', async () => {
            const cleanliness = overlay.querySelector('#rm_clean').value;
            const sleep = overlay.querySelector('#rm_sleep').value;
            const bio = overlay.querySelector('#rm_bio').value.trim();
            if (!cleanliness || !sleep || !bio){ window.toast.error('Please fill all fields.'); return; }
            const sendBtn = overlay.querySelector('#rm_send'); sendBtn.disabled = true;
            const { error: pErr } = await sb.from('profiles').update({
              cleanliness_preference: cleanliness, sleep_schedule: sleep, bio,
            }).eq('id', userId);
            if (pErr){ window.toast.error(pErr.message); sendBtn.disabled = false; return; }
            const { error } = await sb.from('roommate_requests').insert({
              student_id: userId, property_key: propertyKey, status: 'searching',
            });
            if (error){ window.toast.error(error.message || 'Could not post your request.'); sendBtn.disabled = false; return; }
            window.toast.success('You\'re now listed as looking for a roommate here!');
            close();
            refresh();
          });
        }
        refresh();
      } catch (e) {
        listEl.innerHTML = '<div style="color:var(--text-muted); font-size:.9rem;">Roommate service unavailable.</div>';
      }
    })();
  }

  // For DB listings, fetch directly so we get FULL fields (amenities/images/occupancy/landlord)
  async function tryRenderDb() {
    if (typeof id !== 'string' || !id.startsWith('db-')) return false;
    try {
      const sb = await window.SHFCloud.ready;
      const dbId = id.slice(3);
      const { data: p, error } = await sb
        .from('properties')
        .select('id, landlord_id, title, description, address, price, beds, baths, size_sqm, city, neighbourhood, property_type, furnishing, image_urls, amenities, lat, lng, status, occupancy, deposit_months, contact_phone, available_from, video_url')
        .eq('id', dbId)
        .maybeSingle();
      if (error || !p) return false;
      let videoUrl = null;
      if (p.video_url) {
        try {
          const { data: signed } = await sb.storage.from('property-videos').createSignedUrl(p.video_url, 60 * 60 * 6);
          videoUrl = signed?.signedUrl || null;
        } catch (_) {}
      }
      const l = {
        id, dbId: p.id, landlord_id: p.landlord_id, isDb: true,
        title: p.title || 'Untitled', price: Number(p.price) || 0,
        beds: p.beds || 0, baths: p.baths || 0,
        size_sqm: p.size_sqm, area: p.size_sqm ? `${p.size_sqm} sqm` : '',
        city: p.city || '', neighborhood: p.neighbourhood || '', address: p.address || '',
        tag: p.property_type || 'Property', furnishing: p.furnishing || '',
        amenities: Array.isArray(p.amenities) ? p.amenities : [],
        image_urls: Array.isArray(p.image_urls) ? p.image_urls.filter(Boolean) : [],
        img: (Array.isArray(p.image_urls) && p.image_urls[0]) || '',
        lat: p.lat != null ? Number(p.lat) : null,
        lng: p.lng != null ? Number(p.lng) : null,
        desc: p.description || '',
        occupancy: p.occupancy || 'vacant',
        video_url: videoUrl,
      };

      renderDetail(l);
      return true;
    } catch (e) { return false; }
  }

  function tryRenderMock(){
    if (rendered) return true;
    const l = SHF_LISTINGS.find(x => String(x.id) === String(id));
    if (l) { renderDetail(l); return true; }
    return false;
  }

  (async function init(){
    if (typeof id === 'string' && id.startsWith('db-')) {
      const ok = await tryRenderDb();
      if (!ok) renderNotFound();
    } else {
      if (!tryRenderMock()) renderNotFound();
    }
  })();
</script>
</body>
</html>
