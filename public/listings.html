<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Listings — MakaziLink</title>
<meta name="description" content="Browse all available student and rental properties on MakaziLink." />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="/css/styles.css" />
<style>
  .listings-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 1.5rem;
    align-items: stretch;
  }
  @media (max-width: 1024px) { .listings-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
  @media (max-width: 640px)  { .listings-grid { grid-template-columns: 1fr; } }

  .list-card {
    position: relative;
    display: flex;
    flex-direction: column;
    height: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    cursor: pointer;
    transition: transform var(--transition), box-shadow var(--transition);
  }
  .list-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
  .list-card:focus-visible { outline: 2px solid #3B82F6; outline-offset: 2px; }

  .lc-media {
    position: relative;
    width: 100%;
    aspect-ratio: 4 / 3;
    background: var(--surface);
    overflow: hidden;
  }
  .lc-media img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .lc-media .lc-empty {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: .4rem; color: var(--text-muted);
    background: linear-gradient(135deg, var(--surface), var(--bg));
  }
  .lc-media .lc-empty i { font-size: 2rem; opacity: .5; }
  .lc-media .lc-empty span { font-size: .75rem; font-weight: 600; letter-spacing: .5px; }

  .lc-occ {
    position: absolute; top: .75rem; left: .75rem; z-index: 2;
    padding: .3rem .65rem;
    font-size: .72rem; font-weight: 600;
    border-radius: 999px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    background: rgba(255,255,255,.85);
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
  }
  .lc-occ.vacant { color: #166534; }
  .lc-occ.occupied { color: #B91C1C; }

  .lc-play {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 58px; height: 58px; border-radius: 50%;
    background: rgba(255,255,255,.35);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,.5);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 1.15rem;
    box-shadow: 0 4px 16px rgba(0,0,0,.25);
    pointer-events: none;
  }
  .lc-play i { margin-left: 3px; }

  .lc-del {
    position: absolute; top: .6rem; right: .6rem; z-index: 3;
    background: #DC2626; color: #fff; border: none;
    border-radius: 8px; padding: .4rem .65rem;
    font-size: .75rem; font-weight: 600; cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }

  .lc-body { display: flex; flex-direction: column; padding: 1rem 1.1rem 1.1rem; gap: .5rem; flex: 1; }
  .lc-location { font-size: .78rem; color: var(--text-muted); display: flex; align-items: center; gap: .3rem; }
  .lc-title { font-size: 1.1rem; font-weight: 700; line-height: 1.3; margin: 0; color: var(--text); }
  .lc-price { font-size: 1.05rem; font-weight: 700; color: #3B82F6; margin: 0; }
  .lc-price small { font-size: .78rem; font-weight: 500; color: var(--text-muted); }
  .lc-meta { display: flex; flex-wrap: wrap; gap: .35rem .5rem; font-size: .82rem; color: var(--text-muted); align-items: center; }
  .lc-meta .dot { opacity: .45; }

  .lc-desc {
    font-size: .85rem; line-height: 1.5; color: var(--text-muted); margin: 0;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden; text-overflow: ellipsis;
  }

  .lc-spacer { flex: 1; }

  .lc-prox {
    display: flex; flex-wrap: wrap; gap: .35rem;
    padding: .55rem .65rem;
    background: color-mix(in oklab, var(--text) 5%, transparent);
    border-radius: 10px;
    margin-top: .5rem;
  }
  .lc-prox .badge {
    background: transparent !important;
    color: var(--text) !important;
    padding: .1rem .35rem !important;
    font-size: .72rem !important;
    font-weight: 500 !important;
    border: none !important;
    opacity: .85;
  }

  .lc-foot {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: .5rem; padding-top: .6rem;
    border-top: 1px solid var(--border);
    font-size: .78rem; color: var(--text-muted);
  }
  .lc-view {
    color: #3B82F6; font-weight: 600; text-decoration: none;
    display: inline-flex; align-items: center; gap: .3rem;
    font-size: .85rem;
  }
  .lc-view:hover { text-decoration: underline; }
</style>
</head>
<body>
<div id="header-mount"></div>

<section style="margin-top:var(--header-h); padding:3rem 0 2rem; background:linear-gradient(135deg,#3B82F6,#1E40AF); color:#fff;">
  <div class="container">
    <h1 style="color:#fff;">All Listings</h1>
    <p style="color:rgba(255,255,255,.9); margin:0;">Filter and browse verified rentals across the country.</p>
  </div>
</section>

<section style="padding-top:2rem;">
  <div class="container">
    <div class="filter-bar" style="display:flex; gap:.75rem; flex-wrap:wrap; margin-bottom:2rem; align-items:center;">
      <input id="searchInput" type="text" placeholder="Search by city or title..." style="flex:1; min-width:240px; padding:.75rem 1.2rem; border:1px solid var(--border); border-radius:9999px; background:var(--bg); color:var(--text);" />

      <div class="shf-dd" data-dd="campus" style="position:relative;">
        <button type="button" class="shf-dd-btn" data-dd-btn>
          <i class="fas fa-graduation-cap" style="margin-right:.4rem;opacity:.7;"></i>
          <span data-dd-label>Select UDSM Campus</span>
          <i class="fas fa-chevron-down" style="font-size:.7rem;margin-left:.5rem;opacity:.7;"></i>
        </button>
        <div class="shf-dd-panel" data-dd-panel></div>
      </div>

      <div class="shf-dd" data-dd="price" style="position:relative;">
        <button type="button" class="shf-dd-btn" data-dd-btn>
          <span data-dd-label>Any price</span>
          <i class="fas fa-chevron-down" style="font-size:.7rem;margin-left:.5rem;opacity:.7;"></i>
        </button>
        <div class="shf-dd-panel" data-dd-panel></div>
      </div>

      <div class="shf-dd" data-dd="sort" style="position:relative;">
        <button type="button" class="shf-dd-btn" data-dd-btn>
          <span data-dd-label>Newest first</span>
          <i class="fas fa-chevron-down" style="font-size:.7rem;margin-left:.5rem;opacity:.7;"></i>
        </button>
        <div class="shf-dd-panel" data-dd-panel></div>
      </div>

      <select id="bedFilter" style="display:none;"><option value=""></option></select>
      <input type="hidden" id="priceFilter" value="" />
      <input type="hidden" id="sortBy" value="newest" />
    </div>

    <div class="listings-grid" id="grid"></div>
    <p id="empty" style="text-align:center; display:none;">No listings match your filters.</p>
  </div>
</section>

<style>
  .shf-dd-btn {
    display:inline-flex; align-items:center; justify-content:space-between;
    padding:.75rem 1.2rem; min-width:180px;
    border:1px solid var(--border); border-radius:9999px;
    background:var(--bg); color:var(--text);
    font: inherit; font-size:.9rem; cursor:pointer;
    transition:border-color .18s, box-shadow .18s;
  }
  .shf-dd-btn:hover { border-color:#3B82F6; }
  .shf-dd.open .shf-dd-btn { border-color:#3B82F6; box-shadow:0 0 0 3px rgba(59,130,246,.15); }
  .shf-dd-panel {
    position:absolute; top:calc(100% + .5rem); left:0;
    min-width:100%; max-width:300px; z-index:100;
    background:var(--bg); border:1px solid var(--border);
    border-radius:1rem; padding:.4rem;
    box-shadow:0 12px 32px -8px rgba(0,0,0,.18), 0 4px 12px -4px rgba(0,0,0,.08);
    opacity:0; transform:translateY(-6px); pointer-events:none;
    transition:opacity .18s ease, transform .18s ease;
    max-height:320px; overflow-y:auto;
  }
  .shf-dd.open .shf-dd-panel { opacity:1; transform:translateY(0); pointer-events:auto; }
  .shf-dd-item {
    display:block; width:100%; text-align:left;
    padding:.7rem 1rem; border:none; background:transparent;
    color:var(--text); font:inherit; font-size:.88rem;
    border-radius:.65rem; cursor:pointer;
    transition:background .15s, color .15s;
    white-space:nowrap;
  }
  .shf-dd-item:hover, .shf-dd-item:focus-visible {
    background:rgba(59,130,246,.12); color:#1E40AF; outline:none;
  }
  .shf-dd-item.active { background:rgba(59,130,246,.18); color:#1E40AF; font-weight:600; }
</style>

<div id="footer-mount"></div>
<script src="/js/cloud.js"></script>
<script src="/js/data.js"></script>
<script src="/partials.js"></script>
<script src="/js/app.js"></script>
<script>
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const search = document.getElementById('searchInput');
  const bedF = document.getElementById('bedFilter');
  const priceF = document.getElementById('priceFilter');
  const params = new URLSearchParams(location.search);
  if (params.get('q')) search.value = params.get('q');

  function isAdmin() {
    try { const u = JSON.parse(localStorage.getItem('shf-user')||'null'); return !!u && u.role==='admin'; }
    catch(e){ return false; }
  }

  async function deleteListing(dbId, title) {
    if (!confirm(`Delete listing "${title}"?\n\nThis permanently removes it from the database and all renters' listings. This cannot be undone.`)) return;
    try {
      const sb = await window.SHFCloud.ready;
      const { error } = await sb.from('properties').delete().eq('id', dbId);
      if (error) throw error;
      window.toast && window.toast.success && window.toast.success('Listing deleted.');
      window.SHF_LISTINGS = window.SHF_LISTINGS.filter(l => l.dbId !== dbId);
      render();
    } catch (e) {
      const msg = 'Delete failed: ' + (e.message||e);
      window.toast && window.toast.error ? window.toast.error(msg) : alert(msg);
    }
  }
  window.deleteListing = deleteListing;

  function occPill(occ) {
    const isOcc = occ === 'occupied';
    return `<span class="lc-occ ${isOcc?'occupied':'vacant'}">${isOcc?'🔴 Occupied':'🟢 Vacant'}</span>`;
  }

  const sortEl = document.getElementById('sortBy');

  // === Custom pill dropdowns ===
  const priceOptions = [
    { v: '',        label: 'Any price' },
    { v: '300000',  label: 'Under TSh 300,000' },
    { v: '600000',  label: 'Under TSh 600,000' },
    { v: '1000000', label: 'Under TSh 1,000,000' },
    { v: '2000000', label: 'Under TSh 2,000,000' },
    { v: '5000000', label: 'Under TSh 5,000,000' },
  ];
  const sortOptions = [
    { v: 'newest',     label: 'Newest first' },
    { v: 'oldest',     label: 'Oldest first' },
    { v: 'price_asc',  label: 'Price: Low to High' },
    { v: 'price_desc', label: 'Price: High to Low' },
    { v: 'beds_desc',  label: 'Most bedrooms' },
    { v: 'distance',   label: 'Closest to campus' },
  ];
  const campusOptions = (window.SHF.CAMPUSES || []).map(c => ({ v: c.key, label: c.name }));

  function initDropdown(name, options, initialValue, onChange) {
    const wrap = document.querySelector(`.shf-dd[data-dd="${name}"]`);
    if (!wrap) return;
    const btn = wrap.querySelector('[data-dd-btn]');
    const label = wrap.querySelector('[data-dd-label]');
    const panel = wrap.querySelector('[data-dd-panel]');
    let value = initialValue;
    function paint() {
      const active = options.find(o => o.v === value);
      if (active) label.textContent = active.label;
      panel.innerHTML = options.map(o =>
        `<button type="button" class="shf-dd-item ${o.v===value?'active':''}" data-val="${o.v}">${o.label}</button>`
      ).join('');
      panel.querySelectorAll('.shf-dd-item').forEach(el => {
        el.addEventListener('click', () => {
          value = el.dataset.val;
          wrap.classList.remove('open');
          paint();
          onChange(value);
        });
      });
    }
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      document.querySelectorAll('.shf-dd.open').forEach(x => { if (x !== wrap) x.classList.remove('open'); });
      wrap.classList.toggle('open');
    });
    paint();
    return { setValue: (v) => { value = v; paint(); } };
  }

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.shf-dd')) {
      document.querySelectorAll('.shf-dd.open').forEach(x => x.classList.remove('open'));
    }
  });

  initDropdown('price', priceOptions, '', (v) => { priceF.value = v; render(); });
  initDropdown('sort',  sortOptions,  'newest', (v) => { sortEl.value = v; render(); });
  initDropdown('campus', campusOptions, (window.SHF.CAMPUS && window.SHF.CAMPUS.key) || 'mlimani', (v) => {
    window.SHF.setCampus(v);
    // auto-switch sort to distance when a specific campus is picked
    if (v !== 'all') { sortEl.value = 'distance'; }
    render();
  });

  function render() {
    const admin = isAdmin();
    const q = search.value.trim().toLowerCase();
    const minBed = parseInt(bedF.value) || 0;
    const maxPrice = parseInt(priceF.value) || Infinity;
    const filtered = SHF_LISTINGS.filter(l =>
      (!q || l.title.toLowerCase().includes(q) || l.city.toLowerCase().includes(q)) &&
      l.beds >= minBed && l.price <= maxPrice
    );
    const sortKey = sortEl ? sortEl.value : 'newest';
    const ts = l => l.created_at ? new Date(l.created_at).getTime() : 0;
    const dist = l => {
      const d = window.SHF.distanceKm ? window.SHF.distanceKm(l.lat, l.lng) : null;
      return d == null ? Infinity : d;
    };
    filtered.sort((a,b) => {
      switch (sortKey) {
        case 'price_asc': return (a.price||0) - (b.price||0);
        case 'price_desc': return (b.price||0) - (a.price||0);
        case 'beds_desc': return (b.beds||0) - (a.beds||0);
        case 'oldest': return ts(a) - ts(b);
        case 'distance': return dist(a) - dist(b);
        case 'newest':
        default: return ts(b) - ts(a);
      }
    });
    empty.style.display = filtered.length ? 'none' : 'block';

    grid.innerHTML = filtered.map(l => {
      const safeTitle = String(l.title||'').replace(/'/g,"\\'");
      const delBtn = (admin && l.dbId)
        ? `<button class="lc-del" data-no-nav onclick="event.stopPropagation(); deleteListing('${l.dbId}','${safeTitle}')" title="Delete listing"><i class="fas fa-trash"></i></button>`
        : '';
      const media = l.img
        ? `<img data-lightbox src="${l.img}" alt="${l.title}" loading="lazy" />`
        : `<div class="lc-empty"><i class="fas ${l.has_video ? 'fa-circle-play' : 'fa-house'}"></i><span>${l.has_video ? 'VIDEO TOUR' : 'NO PHOTOS'}</span></div>`;
      const playOverlay = (l.has_video && l.img)
        ? `<div class="lc-play"><i class="fas fa-play"></i></div>` : '';
      const location = l.city || '';
      return `
      <article class="list-card" tabindex="0" role="link"
        onclick="if(!event.target.closest('[data-lightbox]') && !event.target.closest('[data-no-nav]')) location.href='/detail.html?id=${l.id}'"
        onkeydown="if((event.key==='Enter'||event.key===' ')&&!event.target.closest('[data-no-nav]')){event.preventDefault();location.href='/detail.html?id=${l.id}'}">
        <div class="lc-media">
          ${media}
          ${occPill(l.occupancy)}
          ${playOverlay}
          ${delBtn}
        </div>
        <div class="lc-body">
          <div class="lc-location"><i class="fas fa-location-dot"></i> ${location}</div>
          <h3 class="lc-title">${l.title}</h3>
          <div class="lc-price">${SHF.formatPrice(l.price)} <small>/ month</small></div>
          <div class="lc-meta">
            <span>🛏️ ${l.beds} Bed${l.beds===1?'':'s'}</span>
            <span class="dot">•</span>
            <span>🚿 ${l.baths} Bath${l.baths===1?'':'s'}</span>
            <span class="dot">•</span>
            <span>📐 ${l.area}</span>
          </div>
          <p class="lc-desc">${l.desc || ''}</p>
          <div class="lc-spacer"></div>
          ${SHF.proximityBadges(l.lat, l.lng) ? `<div class="lc-prox">${SHF.proximityBadges(l.lat, l.lng).replace(/<div[^>]*>|<\/div>/g,'')}</div>` : ''}
          <div class="lc-foot">
            <span>Listed ${SHF.timeAgo(l.created_at)}</span>
            <a class="lc-view" href="/detail.html?id=${l.id}" data-no-nav onclick="event.stopPropagation();">View Details <i class="fas fa-arrow-right"></i></a>
          </div>
        </div>
      </article>`;
    }).join('');
  }
  [search, bedF].forEach(el => el && el.addEventListener('input', render));
  window.addEventListener('shf:listings-updated', render);
  window.addEventListener('shf:campus-changed', render);
  render();
</script>
</body>
</html>
