<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Listings — Smart House Finder</title>
<meta name="description" content="Browse all available student and rental properties on Smart House Finder." />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
<div id="header-mount"></div>

<section style="margin-top:var(--header-h); padding:3rem 0 2rem; background:linear-gradient(135deg,#3B82F6,#1E40AF); color:#fff;">
  <div class="container">
    <h1 style="color:#fff;">All Listings</h1>
    <p style="color:rgba(255,255,255,.9); margin:0;">Filter and browse verified rentals across the country.</p>
  </div>
</section>

<section style="padding-top:2rem;">
  <div class="container">
    <div style="display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:2rem; align-items:center;">
      <input id="searchInput" type="text" placeholder="Search by city or title..." class="" style="flex:1; min-width:240px; padding:.8rem 1rem; border:1px solid var(--border); border-radius:10px; background:var(--bg); color:var(--text);" />
      <select id="bedFilter" style="padding:.8rem 1rem; border:1px solid var(--border); border-radius:10px; background:var(--bg); color:var(--text);">
        <option value="">Any bedrooms</option><option value="1">1+ bed</option><option value="2">2+ beds</option><option value="3">3+ beds</option><option value="4">4+ beds</option>
      </select>
      <select id="priceFilter" style="padding:.8rem 1rem; border:1px solid var(--border); border-radius:10px; background:var(--bg); color:var(--text);">
        <option value="">Any price</option>
        <option value="300000">Under TSh 300,000</option>
        <option value="600000">Under TSh 600,000</option>
        <option value="1000000">Under TSh 1,000,000</option>
        <option value="2000000">Under TSh 2,000,000</option>
        <option value="5000000">Under TSh 5,000,000</option>
      </select>
      <select id="sortBy" style="padding:.8rem 1rem; border:1px solid var(--border); border-radius:10px; background:var(--bg); color:var(--text);">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
        <option value="price_asc">Price: Low to High</option>
        <option value="price_desc">Price: High to Low</option>
        <option value="beds_desc">Most bedrooms</option>
      </select>
    </div>

    <div class="masonry" id="grid"></div>
    <p id="empty" style="text-align:center; display:none;">No listings match your filters.</p>
  </div>
</section>

<div id="footer-mount"></div>
<script src="/js/cloud.js"></script>
<script src="/js/data.js"></script>
<script src="/partials.js"></script>
<script src="/js/app.js"></script>
<script>
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const search = document.getElementById('searchInput');
  const bedF = document.getElementById('bedFilter');
  const priceF = document.getElementById('priceFilter');
  const params = new URLSearchParams(location.search);
  if (params.get('q')) search.value = params.get('q');

  function isAdmin() {
    try { const u = JSON.parse(localStorage.getItem('shf-user')||'null'); return !!u && u.role==='admin'; }
    catch(e){ return false; }
  }

  async function deleteListing(dbId, title) {
    if (!confirm(`Delete listing "${title}"?\n\nThis permanently removes it from the database and all renters' listings. This cannot be undone.`)) return;
    try {
      const sb = await window.SHFCloud.ready;
      const { error } = await sb.from('properties').delete().eq('id', dbId);
      if (error) throw error;
      window.toast && window.toast.success && window.toast.success('Listing deleted.');
      window.SHF_LISTINGS = window.SHF_LISTINGS.filter(l => l.dbId !== dbId);
      render();
    } catch (e) {
      const msg = 'Delete failed: ' + (e.message||e);
      window.toast && window.toast.error ? window.toast.error(msg) : alert(msg);
    }
  }
  window.deleteListing = deleteListing;

  const sortEl = document.getElementById('sortBy');
  function render() {
    const admin = isAdmin();
    const q = search.value.trim().toLowerCase();
    const minBed = parseInt(bedF.value) || 0;
    const maxPrice = parseInt(priceF.value) || Infinity;
    const filtered = SHF_LISTINGS.filter(l =>
      (!q || l.title.toLowerCase().includes(q) || l.city.toLowerCase().includes(q)) &&
      l.beds >= minBed && l.price <= maxPrice
    );
    const sortKey = sortEl ? sortEl.value : 'newest';
    const ts = l => l.created_at ? new Date(l.created_at).getTime() : 0;
    filtered.sort((a,b) => {
      switch (sortKey) {
        case 'price_asc': return (a.price||0) - (b.price||0);
        case 'price_desc': return (b.price||0) - (a.price||0);
        case 'beds_desc': return (b.beds||0) - (a.beds||0);
        case 'oldest': return ts(a) - ts(b);
        case 'newest':
        default: return ts(b) - ts(a);
      }
    });
    empty.style.display = filtered.length ? 'none' : 'block';

    grid.innerHTML = filtered.map(l => {
      const safeTitle = String(l.title||'').replace(/'/g,"\\'");
      const delBtn = (admin && l.dbId)
        ? `<button data-no-nav onclick="event.stopPropagation(); deleteListing('${l.dbId}','${safeTitle}')" title="Delete listing" style="position:absolute; top:.6rem; right:.6rem; z-index:5; background:#DC2626; color:#fff; border:none; border-radius:8px; padding:.45rem .7rem; font-size:.8rem; font-weight:600; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,.25);"><i class="fas fa-trash"></i> Delete</button>`
        : '';
      return `
      <article class="card" onclick="if(!event.target.closest('[data-lightbox]') && !event.target.closest('[data-no-nav]')) location.href='/detail.html?id=${l.id}'" style="cursor:pointer; position:relative;">
        ${delBtn}
        <img data-lightbox src="${l.img}" alt="${l.title}" loading="lazy" />
        <div class="card-body">
          <div style="display:flex;gap:.4rem;flex-wrap:wrap;">
            <span class="badge">${l.tag}</span>
            ${SHF.occupancyBadge(l.occupancy)}
          </div>
          <h3 style="margin:.6rem 0 .25rem;">${l.title}</h3>
          <div class="card-price">${SHF.formatPrice(l.price)}<small style="color:var(--text-muted);font-weight:400;font-size:.85rem;"> /month</small></div>
          <p style="margin:.6rem 0 .5rem; font-size:.9rem;">${l.desc}</p>
          <div class="card-meta"><span><i class="fas fa-bed"></i> ${l.beds}</span><span><i class="fas fa-bath"></i> ${l.baths}</span><span><i class="fas fa-ruler-combined"></i> ${l.area}</span><span><i class="fas fa-location-dot"></i> ${l.city}</span></div>
          ${SHF.proximityBadges(l.lat, l.lng)}
          <a href="/detail.html?id=${l.id}" class="btn btn-outline" style="margin-top:.75rem; width:100%; justify-content:center;">View details <i class="fas fa-arrow-right"></i></a>
        </div>
      </article>`;
    }).join('');
  }
  [search, bedF, priceF, sortEl].forEach(el => el && el.addEventListener('input', render));
  window.addEventListener('shf:listings-updated', render);
  render();
</script>
</body>
</html>
