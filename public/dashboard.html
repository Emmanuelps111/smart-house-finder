<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Landlord Dashboard — Smart House Finder</title>
<meta name="description" content="Manage your property listings, add new houses with photos and details." />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="/css/styles.css" />
<style>
  .dash-wrap { margin-top: calc(var(--header-h) + 2rem); padding: 2rem 0 4rem; }
  .dash-hero { background: linear-gradient(135deg,#3B82F6,#1E40AF); color:#fff; padding: 3.25rem 0 2.5rem; margin-bottom: 2rem; }
  .dash-hero h1 { color:#fff; margin:0 0 .35rem; }
  .dash-hero p { color: rgba(255,255,255,.9); margin:0; }
  .dash-grid { display:grid; grid-template-columns: 1.1fr 1fr; gap:2rem; }
  @media (max-width: 980px) { .dash-grid { grid-template-columns: 1fr; } }
  .panel { background: var(--surface); border:1px solid var(--border); border-radius:14px; padding:1.5rem; margin-bottom:1.5rem; }
  .panel h2 { margin:0 0 1rem; font-size:1.2rem; }
  .stats { display:grid; grid-template-columns: repeat(3,1fr); gap:1rem; margin-bottom:2rem; }
  .stat { background: var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.1rem; text-align:center; }
  .stat .num { font-size:1.8rem; font-weight:700; color: var(--primary); }
  .stat .lbl { font-size:.85rem; color: var(--text-muted); }
  .grid-2 { display:grid; grid-template-columns: 1fr 1fr; gap:.75rem; }
  .grid-3 { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:.75rem; }
  @media (max-width: 600px) { .grid-2,.grid-3 { grid-template-columns: 1fr; } }
  .file-input-wrap { border: 2px dashed var(--border); border-radius:10px; padding:1rem; text-align:center; cursor:pointer; }
  .file-input-wrap input[type="file"] { display:none; }
  .preview-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(90px,1fr)); gap:.5rem; margin-top:.75rem; }
  .preview-grid .ph { position:relative; aspect-ratio:1; border-radius:8px; overflow:hidden; border:1px solid var(--border); }
  .preview-grid img { width:100%; height:100%; object-fit:cover; }
  .preview-grid button { position:absolute; top:3px; right:3px; background:rgba(0,0,0,.6); color:#fff; border:none; width:22px; height:22px; border-radius:50%; cursor:pointer; }
  .my-listing { display:flex; gap:.75rem; padding:.75rem; border:1px solid var(--border); border-radius:10px; margin-bottom:.75rem; align-items:center; }
  .my-listing img { width:80px; height:80px; object-fit:cover; border-radius:8px; flex-shrink:0; background:#f1f5f9; }
  .my-listing .info { flex:1; min-width:0; }
  .my-listing .info h4 { margin:0 0 .2rem; font-size:.95rem; }
  .my-listing .info .meta { font-size:.8rem; color: var(--text-muted); }
  .my-listing .actions { display:flex; gap:.4rem; flex-direction:column; }
  .my-listing button { background:none; border:1px solid var(--border); padding:.4rem .6rem; border-radius:6px; cursor:pointer; color: var(--text); font-size:.8rem; }
  .my-listing button:hover { border-color: var(--primary); color: var(--primary); }
  .my-listing button.del:hover { border-color:#ef4444; color:#ef4444; }
  .empty-state { text-align:center; padding:2rem 1rem; color: var(--text-muted); }
  .amenity-chips { display:flex; flex-wrap:wrap; gap:.5rem; }
  .amenity-chips label { display:inline-flex; align-items:center; gap:.35rem; padding:.4rem .75rem; border:1px solid var(--border); border-radius:20px; cursor:pointer; font-size:.85rem; }
  .amenity-chips input { display:none; }
  .amenity-chips label:has(input:checked) { border-color: var(--primary); background: rgba(59,130,246,.08); color:var(--primary); font-weight:600; }
  .access-denied { text-align:center; padding:5rem 1rem; }
  .notif { padding:.85rem; border:1px solid var(--border); border-radius:10px; margin-bottom:.5rem; }
  .notif.new { background: rgba(59,130,246,.05); border-color: var(--primary); }
  .notif .who { font-weight:600; }
  .notif .when { font-size:.75rem; color:var(--text-muted); }
</style>
</head>
<body>
<div id="header-mount"></div>
<div id="appRoot"></div>
<div id="footer-mount"></div>
<script src="/js/data.js"></script>
<script src="/js/cloud.js"></script>
<script src="/partials.js"></script>
<script src="/js/app.js"></script>
<script>
  const root = document.getElementById('appRoot');
  let sb = null, user = null, myListings = [], notifications = [];
  let pendingPhotos = []; // {name, file, dataUrl}
  let existingPhotoUrls = []; // when editing
  let editingId = null;

  (async function init() {
    sb = await window.SHFCloud.ready;
    const { data: { user: authUser } } = await sb.auth.getUser();
    if (!authUser) return renderDenied('Please sign in to manage listings.');
    await window.SHFCloud.syncLocalUser(sb, (await sb.auth.getSession()).data.session);
    user = JSON.parse(localStorage.getItem('shf-user') || 'null');
    if (!user || (user.role !== 'landlord' && user.role !== 'admin')) {
      return renderDenied('You need a landlord account to manage listings.');
    }
    await Promise.all([loadMine(), loadNotifications()]);
    renderDashboard();
  })();

  function renderDenied(msg) {
    root.innerHTML = `<div class="dash-wrap"><div class="container access-denied">
      <i class="fas fa-lock" style="font-size:3.5rem;color:var(--primary);"></i>
      <h1>Landlords only</h1><p>${msg}</p>
      <a href="/login.html" class="btn btn-primary" style="margin-top:1rem;">Go to sign in</a>
    </div></div>`;
  }

  async function loadMine() {
    const { data, error } = await sb.from('properties').select('*').eq('landlord_id', user.id).order('created_at', { ascending: false });
    if (error) { window.toast.error('Could not load listings: ' + error.message); myListings = []; return; }
    myListings = data || [];
  }

  async function loadNotifications() {
    const { data, error } = await sb
      .from('viewing_requests')
      .select('id, contact_phone, message, seen, created_at, property_id, renter_id, properties:property_id(title)')
      .eq('landlord_id', user.id)
      .order('created_at', { ascending: false })
      .limit(50);
    if (!error) notifications = data || [];
  }

  function renderDashboard() {
    const activeCount = myListings.filter(l => l.status === 'approved').length;
    const pendingCount = myListings.filter(l => l.status === 'pending').length;
    const unseen = notifications.filter(n => !n.seen).length;
    root.innerHTML = `
      <div class="dash-hero"><div class="container">
        <h1>Welcome back, ${escapeHtml(user.name || 'Landlord')} <i class="fas fa-circle-check" style="font-size:1.1rem; color:#10b981;" title="Verified"></i></h1>
        <p>Manage your properties, view requests and update availability.</p>
      </div></div>
      <div class="container">
        <div class="stats">
          <div class="stat"><div class="num">${activeCount}</div><div class="lbl">Approved</div></div>
          <div class="stat"><div class="num">${pendingCount}</div><div class="lbl">Pending review</div></div>
          <div class="stat"><div class="num">${unseen}</div><div class="lbl">New viewing requests</div></div>
        </div>

        <div class="panel">
          <h2><i class="fas fa-bell" style="color:var(--primary);"></i> Viewing requests ${unseen?`<span class="badge" style="background:#ef4444;color:#fff;">${unseen} new</span>`:''}</h2>
          <div id="notifList"></div>
        </div>

        <div class="dash-grid">
          <div class="panel">
            <h2 id="formTitle"><i class="fas fa-plus-circle" style="color:var(--primary);"></i> Add a new property</h2>
            <form id="propForm" novalidate></form>
          </div>
          <div class="panel">
            <h2><i class="fas fa-list" style="color:var(--primary);"></i> My listings (${myListings.length})</h2>
            <div id="myList"></div>
          </div>
        </div>
      </div>`;
    renderForm();
    renderMine();
    renderNotifs();
  }

  function escapeHtml(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function renderNotifs() {
    const el = document.getElementById('notifList');
    if (!notifications.length) {
      el.innerHTML = `<div style="color:var(--text-muted); font-size:.9rem;">No viewing requests yet.</div>`;
      return;
    }
    el.innerHTML = notifications.map(n => `
      <div class="notif ${n.seen?'':'new'}" data-id="${n.id}">
        <div class="who">📞 ${escapeHtml(n.contact_phone)} requested a viewing</div>
        <div style="font-size:.85rem; margin:.2rem 0;">on <strong>${escapeHtml(n.properties?.title || 'a property')}</strong>${n.message?` — "${escapeHtml(n.message)}"`:''}</div>
        <div class="when">${new Date(n.created_at).toLocaleString()}</div>
        ${n.seen?'':'<button class="btn btn-outline" style="margin-top:.4rem; padding:.3rem .7rem; font-size:.8rem;" data-mark="'+n.id+'">Mark as seen</button>'}
      </div>`).join('');
    el.querySelectorAll('[data-mark]').forEach(b => b.addEventListener('click', async () => {
      const id = b.dataset.mark;
      await sb.from('viewing_requests').update({ seen: true }).eq('id', id);
      await loadNotifications(); renderDashboard();
    }));
  }

  function renderForm(prefill) {
    const f = document.getElementById('propForm');
    const v = prefill || {};
    const selectedAmenities = new Set(v.amenities || []);
    document.getElementById('formTitle').innerHTML = prefill
      ? '<i class="fas fa-pen" style="color:var(--primary);"></i> Edit property'
      : '<i class="fas fa-plus-circle" style="color:var(--primary);"></i> Add a new property';

    f.innerHTML = `
      <div class="form-row"><label>Property title *</label><input id="p-title" type="text" value="${escapeHtml(v.title||'')}" required /><span class="error"></span></div>
      <div class="grid-2">
        <div class="form-row"><label>City *</label><input id="p-city" type="text" value="${escapeHtml(v.city||'')}" required /><span class="error"></span></div>
        <div class="form-row"><label>Neighbourhood</label><input id="p-area" type="text" value="${escapeHtml(v.neighbourhood||'')}" /></div>
      </div>
      <div class="grid-3">
        <div class="form-row"><label>Rent / month (TSh) *</label><input id="p-price" type="number" min="10000" step="10000" value="${v.price||''}" required /><span class="error"></span></div>
        <div class="form-row"><label>Bedrooms *</label><input id="p-beds" type="number" min="0" max="20" value="${v.beds||1}" required /></div>
        <div class="form-row"><label>Bathrooms *</label><input id="p-baths" type="number" min="0" max="20" value="${v.baths||1}" required /></div>
      </div>
      <div class="grid-2">
        <div class="form-row"><label>Size (sqm) <small style="color:var(--text-muted);">— optional</small></label><input id="p-size" type="number" min="5" value="${v.size_sqm||''}" /></div>
        <div class="form-row"><label>Property type</label>
          <select id="p-type">
            ${['Apartment','Studio','Single room','Shared house','Townhouse','Bungalow','Penthouse'].map(o=>`<option ${v.property_type===o?'selected':''}>${o}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="grid-2">
        <div class="form-row"><label>Furnishing</label>
          <select id="p-furn">
            ${['Furnished','Semi-furnished','Unfurnished'].map(o=>`<option ${v.furnishing===o?'selected':''}>${o}</option>`).join('')}
          </select>
        </div>
        <div class="form-row"><label>Available from</label><input id="p-avail" type="date" value="${v.available_from||''}" /></div>
      </div>
      <div class="form-row"><label>Occupancy status</label>
        <select id="p-occ">
          <option value="vacant" ${v.occupancy!=='occupied'?'selected':''}>🟢 Vacant — available to rent</option>
          <option value="occupied" ${v.occupancy==='occupied'?'selected':''}>🔴 Occupied — currently rented</option>
        </select>
      </div>
      <div class="form-row"><label>Amenities <small style="color:var(--text-muted);">— only selected ones are shown to renters</small></label>
        <div class="amenity-chips">
          ${['Wi-Fi','Parking','Security','Water tank','Generator','Air conditioning','Kitchen','Laundry','Pet friendly','Garden','Balcony','Furnished'].map(a =>
            `<label><input type="checkbox" name="amenity" value="${a}" ${selectedAmenities.has(a)?'checked':''}><span>${a}</span></label>`).join('')}
        </div>
      </div>
      <div class="grid-2">
        <div class="form-row"><label>Latitude <small style="color:var(--text-muted);">— supports decimals & negatives</small></label><input id="p-lat" type="number" step="any" placeholder="-6.7741" value="${v.lat??''}" /></div>
        <div class="form-row"><label>Longitude</label><input id="p-lng" type="number" step="any" placeholder="39.2417" value="${v.lng??''}" /></div>
      </div>
      <div class="form-row"><label>Description <span style="color:var(--text-muted); font-weight:400; font-size:.85em;">(optional)</span></label><textarea id="p-desc" rows="4" maxlength="800" placeholder="Additional information about the property — neighbourhood, rules, nearby amenities, anything renters should know.">${escapeHtml(v.description||'')}</textarea><span class="error"></span></div>
      <div class="form-row">
        <label>Property photos * (at least 1, up to 8) — only photos you upload will be shown</label>
        <label class="file-input-wrap" for="p-photos">
          <i class="fas fa-camera-retro" style="font-size:1.5rem; color:var(--primary);"></i>
          <div>Click to upload photos — JPG or PNG (max 3MB each)</div>
          <input id="p-photos" type="file" accept="image/*" multiple />
        </label>
        <div class="preview-grid" id="photoPreview"></div>
        <span class="error"></span>
      </div>
      <div class="grid-2">
        <div class="form-row"><label>Contact phone</label><input id="p-contact" type="tel" placeholder="+255759996841" value="${escapeHtml(v.contact_phone||'')}" /></div>
        <div class="form-row"><label>Deposit (months)</label><input id="p-deposit" type="number" min="0" max="12" value="${v.deposit_months??2}" /></div>
      </div>
      <div style="display:flex; gap:.5rem; margin-top:.75rem;">
        <button type="submit" id="publishBtn" class="btn btn-primary" style="flex:1; justify-content:center;">
          <i class="fas fa-cloud-arrow-up"></i> ${prefill?'Save changes':'Publish listing'}
        </button>
        ${prefill?'<button type="button" id="cancelEdit" class="btn btn-outline">Cancel</button>':''}
      </div>`;

    existingPhotoUrls = Array.isArray(v.image_urls) ? [...v.image_urls] : [];
    pendingPhotos = [];
    bindForm();
    if (prefill && document.getElementById('cancelEdit')) {
      document.getElementById('cancelEdit').addEventListener('click', () => { editingId = null; renderForm(); });
    }
  }

  function drawPreviews() {
    const preview = document.getElementById('photoPreview');
    const existHtml = existingPhotoUrls.map((url, i) =>
      `<div class="ph"><img src="${escapeHtml(url)}" alt=""><button type="button" data-rmexist="${i}" aria-label="Remove">✕</button></div>`).join('');
    const newHtml = pendingPhotos.map((p, i) =>
      `<div class="ph"><img src="${p.dataUrl}" alt=""><button type="button" data-rmnew="${i}" aria-label="Remove">✕</button></div>`).join('');
    preview.innerHTML = existHtml + newHtml;
    preview.querySelectorAll('[data-rmexist]').forEach(b => b.addEventListener('click', () => { existingPhotoUrls.splice(+b.dataset.rmexist, 1); drawPreviews(); }));
    preview.querySelectorAll('[data-rmnew]').forEach(b => b.addEventListener('click', () => { pendingPhotos.splice(+b.dataset.rmnew, 1); drawPreviews(); }));
  }

  function bindForm() {
    const photosInput = document.getElementById('p-photos');
    drawPreviews();

    photosInput.addEventListener('change', async () => {
      const files = Array.from(photosInput.files || []);
      for (const file of files) {
        if ((existingPhotoUrls.length + pendingPhotos.length) >= 8) break;
        if (file.size > 3 * 1024 * 1024) { window.toast.error(`${file.name} is over 3MB and was skipped.`); continue; }
        const dataUrl = await new Promise(res => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(file); });
        pendingPhotos.push({ name: file.name, file, dataUrl });
      }
      photosInput.value = '';
      drawPreviews();
    });

    document.getElementById('propForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.querySelectorAll('#propForm .error').forEach(el => el.textContent = '');
      const get = id => document.getElementById(id).value.trim();
      const setErr = (id, m) => { const f = document.getElementById(id); const er = f.parentElement.querySelector('.error'); if (er) er.textContent = m; };
      let ok = true;
      if (!get('p-title')) { setErr('p-title','Title is required'); ok = false; }
      if (!get('p-city')) { setErr('p-city','City is required'); ok = false; }
      if (!get('p-price') || +get('p-price') < 10000) { setErr('p-price','Enter a valid rent'); ok = false; }
      // description is optional
      if ((existingPhotoUrls.length + pendingPhotos.length) === 0) { setErr('p-photos','Please add at least one photo'); ok = false; }
      const phone = get('p-contact');
      if (phone && !/^\+255\d{9}$/.test(phone)) { setErr('p-contact','Phone must be +255 followed by 9 digits'); ok = false; }
      if (!ok) return;

      const btn = document.getElementById('publishBtn');
      const original = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving…';

      try {
        const amenities = Array.from(document.querySelectorAll('input[name="amenity"]:checked')).map(c => c.value);
        const city = get('p-city'), area = get('p-area');
        const address = area ? `${area}, ${city}` : city;
        const latRaw = parseFloat(get('p-lat')), lngRaw = parseFloat(get('p-lng'));

        // Upload new photos
        const ts = Date.now();
        const newUrls = [];
        for (let i = 0; i < pendingPhotos.length; i++) {
          const p = pendingPhotos[i];
          const safeName = p.name.replace(/[^a-zA-Z0-9._-]/g, '_');
          const path = `${user.id}/${ts}-${i}-${safeName}`;
          const { error: upErr } = await sb.storage.from('property-photos').upload(path, p.file, { contentType: p.file.type || 'image/jpeg' });
          if (upErr) throw upErr;
          const { data: pub } = sb.storage.from('property-photos').getPublicUrl(path);
          newUrls.push(pub.publicUrl);
        }

        const payload = {
          title: get('p-title'),
          description: get('p-desc'),
          address,
          price: +get('p-price'),
          city,
          neighbourhood: area || null,
          furnishing: document.getElementById('p-furn').value,
          beds: +get('p-beds') || 0,
          baths: +get('p-baths') || 0,
          size_sqm: get('p-size') ? +get('p-size') : null,
          deposit_months: +get('p-deposit') || 0,
          available_from: get('p-avail') || null,
          contact_phone: phone || null,
          lat: isNaN(latRaw) ? null : latRaw,
          lng: isNaN(lngRaw) ? null : lngRaw,
          amenities,
          image_urls: [...existingPhotoUrls, ...newUrls],
          property_type: document.getElementById('p-type').value,
          occupancy: document.getElementById('p-occ').value,
        };

        if (editingId) {
          const { error } = await sb.from('properties').update(payload).eq('id', editingId);
          if (error) throw error;
          window.toast.success('Listing updated!');
        } else {
          payload.landlord_id = user.id;
          payload.status = 'pending';
          const { error } = await sb.from('properties').insert(payload);
          if (error) throw error;
          window.toast.success('Listing submitted for review!');
        }
        editingId = null;
        await loadMine();
        renderDashboard();
      } catch (err) {
        window.toast.error(err.message || 'Could not save listing.');
        btn.disabled = false;
        btn.innerHTML = original;
      }
    });
  }

  function renderMine() {
    const list = document.getElementById('myList');
    if (!myListings.length) {
      list.innerHTML = `<div class="empty-state"><i class="fas fa-inbox" style="font-size:2.5rem;color:var(--primary);opacity:.5;"></i><p>No listings yet. Add your first property using the form.</p></div>`;
      return;
    }
    const fmt = n => 'TSh ' + Number(n).toLocaleString();
    const statusBadge = s => {
      const c = s === 'approved' ? '#10b981' : s === 'rejected' ? '#ef4444' : '#f59e0b';
      return `<span style="font-size:.7rem;padding:.15rem .5rem;border-radius:10px;background:${c}22;color:${c};font-weight:600;text-transform:uppercase;">${s}</span>`;
    };
    const occBadge = o => {
      const isOcc = o === 'occupied';
      return `<span style="font-size:.7rem;padding:.15rem .5rem;border-radius:10px;background:${isOcc?'#FEE2E2':'#DCFCE7'};color:${isOcc?'#B91C1C':'#166534'};font-weight:600;">${isOcc?'🔴 Occupied':'🟢 Vacant'}</span>`;
    };
    list.innerHTML = myListings.map(l => `
      <div class="my-listing">
        <img src="${(l.image_urls && l.image_urls[0]) || 'https://placehold.co/160?text=No+photo'}" alt="${escapeHtml(l.title)}">
        <div class="info">
          <h4>${escapeHtml(l.title)} ${statusBadge(l.status)} ${occBadge(l.occupancy)}</h4>
          <div class="meta">${fmt(l.price)} / month · ${l.beds || '-'} bd · ${escapeHtml(l.city || l.address || '')}</div>
          <label style="display:inline-flex;align-items:center;gap:.35rem;font-size:.8rem;margin-top:.3rem;cursor:pointer;">
            <input type="checkbox" data-occ="${l.id}" ${l.occupancy==='occupied'?'checked':''} /> Mark as occupied (rented)
          </label>
        </div>
        <div class="actions">
          <button data-view="${l.id}" title="View / edit"><i class="fas fa-eye"></i></button>
          <button data-edit="${l.id}" title="Edit"><i class="fas fa-pen"></i></button>
          <button class="del" data-del="${l.id}" title="Delete"><i class="fas fa-trash"></i></button>
        </div>
      </div>`).join('');

    list.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', async () => {
      if (!confirm('Delete this listing?')) return;
      const { error } = await sb.from('properties').delete().eq('id', b.dataset.del);
      if (error) { window.toast.error(error.message); return; }
      window.toast.success('Listing deleted.');
      await loadMine(); renderDashboard();
    }));
    list.querySelectorAll('[data-edit], [data-view]').forEach(b => b.addEventListener('click', () => {
      const id = b.dataset.edit || b.dataset.view;
      const item = myListings.find(x => x.id === id);
      if (!item) return;
      editingId = id;
      renderForm(item);
      document.getElementById('propForm').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }));
    list.querySelectorAll('[data-occ]').forEach(c => c.addEventListener('change', async () => {
      const id = c.dataset.occ;
      const next = c.checked ? 'occupied' : 'vacant';
      const { error } = await sb.from('properties').update({ occupancy: next }).eq('id', id);
      if (error) { window.toast.error(error.message); c.checked = !c.checked; return; }
      window.toast.success(`Marked as ${next}.`);
      await loadMine();
    }));
  }
</script>
</body>
</html>
