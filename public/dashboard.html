<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Landlord Dashboard — Smart House Finder</title>
<meta name="description" content="Manage your property listings, add new houses with photos and details." />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="/css/styles.css" />
<style>
  .dash-wrap { margin-top: calc(var(--header-h) + 2rem); padding: 2rem 0 4rem; }
  .dash-hero { background: linear-gradient(135deg,#3B82F6,#1E40AF); color:#fff; margin-top: var(--header-h); padding: 3.25rem 0 2.5rem; margin-bottom: 2rem; }
  .dash-hero h1 { color:#fff; margin:0 0 .35rem; }
  .dash-hero p { color: rgba(255,255,255,.9); margin:0; }
  .dash-grid { display:grid; grid-template-columns: 1.1fr 1fr; gap:2rem; }
  @media (max-width: 980px) { .dash-grid { grid-template-columns: 1fr; } }
  .panel { background: var(--surface); border:1px solid var(--border); border-radius:14px; padding:1.5rem; margin-bottom:1.5rem; }
  .panel h2 { margin:0 0 1rem; font-size:1.2rem; }
  .stats { display:grid; grid-template-columns: repeat(3,1fr); gap:1rem; margin-bottom:2rem; }
  .stat { background: var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.1rem; text-align:center; }
  .stat .num { font-size:1.8rem; font-weight:700; color: var(--primary); }
  .stat .lbl { font-size:.85rem; color: var(--text-muted); }
  .grid-2 { display:grid; grid-template-columns: 1fr 1fr; gap:.75rem; }
  .grid-3 { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:.75rem; }
  @media (max-width: 600px) { .grid-2,.grid-3 { grid-template-columns: 1fr; } }
  .file-input-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.5rem; width:100%; box-sizing:border-box; border: 2px dashed var(--border); border-radius:12px; padding:1.75rem 1rem; text-align:center; cursor:pointer; background: color-mix(in oklab, var(--text-muted) 6%, transparent); transition: all .2s; }
  .file-input-wrap:hover { border-color: var(--primary); background: rgba(59,130,246,.05); }
  .file-input-wrap input[type="file"] { display:none; }
  .media-stack { display:flex; flex-direction:column; gap:1.25rem; }
  .preview-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(90px,1fr)); gap:.5rem; margin-top:.75rem; }
  .preview-grid .ph { position:relative; aspect-ratio:1; border-radius:8px; overflow:hidden; border:1px solid var(--border); }
  .preview-grid img { width:100%; height:100%; object-fit:cover; }
  .preview-grid button { position:absolute; top:3px; right:3px; background:rgba(0,0,0,.6); color:#fff; border:none; width:22px; height:22px; border-radius:50%; cursor:pointer; }
  .my-listing { display:flex; gap:.75rem; padding:.75rem; border:1px solid var(--border); border-radius:10px; margin-bottom:.75rem; align-items:center; }
  .my-listing img { width:80px; height:80px; object-fit:cover; border-radius:8px; flex-shrink:0; background:#f1f5f9; }
  .my-listing .info { flex:1; min-width:0; }
  .my-listing .info h4 { margin:0 0 .2rem; font-size:.95rem; }
  .my-listing .info .meta { font-size:.8rem; color: var(--text-muted); }
  .my-listing .actions { display:flex; gap:.4rem; flex-direction:column; }
  .my-listing button { background:none; border:1px solid var(--border); padding:.4rem .6rem; border-radius:6px; cursor:pointer; color: var(--text); font-size:.8rem; }
  .my-listing button:hover { border-color: var(--primary); color: var(--primary); }
  .my-listing button.del:hover { border-color:#ef4444; color:#ef4444; }
  .empty-state { text-align:center; padding:2rem 1rem; color: var(--text-muted); }
  .amenity-chips { display:flex; flex-wrap:wrap; gap:.5rem; }
  .amenity-chips label { display:inline-flex; align-items:center; gap:.35rem; padding:.4rem .75rem; border:1px solid var(--border); border-radius:20px; cursor:pointer; font-size:.85rem; }
  .amenity-chips input { display:none; }
  .amenity-chips label:has(input:checked) { border-color: var(--primary); background: rgba(59,130,246,.08); color:var(--primary); font-weight:600; }
  .access-denied { text-align:center; padding:5rem 1rem; }
  .notif { padding:.85rem; border:1px solid var(--border); border-radius:10px; margin-bottom:.5rem; }
  .notif.new { background: rgba(59,130,246,.05); border-color: var(--primary); }
  .notif .who { font-weight:600; }
  .notif .when { font-size:.75rem; color:var(--text-muted); }
  .mode-tabs { display:flex; gap:.5rem; margin-bottom:1.2rem; background: var(--bg); padding:.35rem; border-radius:12px; border:1px solid var(--border); }
  .mode-tab { flex:1; padding:.7rem 1rem; background:transparent; border:none; border-radius:9px; cursor:pointer; font:600 .92rem/1 Inter,sans-serif; color:var(--text-muted); display:inline-flex; align-items:center; justify-content:center; gap:.5rem; transition: all .2s; }
  .mode-tab:hover:not(:disabled):not(.active) { color: var(--text); background: var(--surface); }
  .mode-tab.active { background: var(--primary); color:#fff; box-shadow: 0 4px 12px -4px rgba(59,130,246,.4); }
  .mode-tab:disabled { opacity:.55; cursor:not-allowed; }
  .bulk-drop { display:block; width:100%; box-sizing:border-box; border:2px dashed var(--border); border-radius:12px; padding:2.5rem 1rem; text-align:center; cursor:pointer; transition:all .2s; background: color-mix(in oklab, var(--text-muted) 6%, transparent); }
  .bulk-drop:hover { border-color: var(--primary); }
  .bulk-drop.drag { border-color: var(--primary); background: rgba(59,130,246,.08); }
  .bulk-drop input[type=file]{display:none;}
  .bulk-drop i.up { font-size:2.5rem; color:var(--primary); margin-bottom:.6rem; display:block; }
  .bulk-preview { margin-top:1rem; max-height:280px; overflow:auto; border:1px solid var(--border); border-radius:10px; font-size:.8rem; }
  .bulk-preview table { width:100%; border-collapse:collapse; }
  .bulk-preview th, .bulk-preview td { padding:.4rem .6rem; border-bottom:1px solid var(--border); text-align:left; white-space:nowrap; }
  .bulk-preview th { background: var(--bg); position:sticky; top:0; font-weight:600; }
</style>
</head>
<body>
<div id="header-mount"></div>
<div id="appRoot"></div>
<div id="footer-mount"></div>
<script src="/js/data.js"></script>
<script src="/js/cloud.js"></script>
<script src="/partials.js"></script>
<script src="/js/app.js"></script>
<script>
  const root = document.getElementById('appRoot');
  let sb = null, user = null, myListings = [], notifications = [];
  let pendingPhotos = []; // {name, file, dataUrl}
  let existingPhotoUrls = []; // when editing
  let pendingVideo = null; // {name, file}
  let existingVideoPath = null;
  let editingId = null;


  (async function init() {
    sb = await window.SHFCloud.ready;
    const { data: { user: authUser } } = await sb.auth.getUser();
    if (!authUser) return renderDenied('Please sign in to manage listings.');
    await window.SHFCloud.syncLocalUser(sb, (await sb.auth.getSession()).data.session);
    user = JSON.parse(localStorage.getItem('shf-user') || 'null');
    if (!user || (user.role !== 'landlord' && user.role !== 'admin')) {
      return renderDenied('You need a landlord account to manage listings.');
    }
    // Verification gate — landlords must be approved (admins bypass)
    if (user.role !== 'admin') {
      const { data: prof } = await sb.from('profiles').select('verification_status').eq('id', user.id).maybeSingle();
      if (!prof || prof.verification_status !== 'approved') {
        return renderPending(prof?.verification_status || 'pending');
      }
    }
    await Promise.all([loadMine(), loadNotifications()]);
    renderDashboard();
  })();

  function renderDenied(msg) {
    root.innerHTML = `<div class="dash-wrap"><div class="container access-denied">
      <i class="fas fa-lock" style="font-size:3.5rem;color:var(--primary);"></i>
      <h1>Landlords only</h1><p>${msg}</p>
      <a href="/login.html" class="btn btn-primary" style="margin-top:1rem;">Go to sign in</a>
    </div></div>`;
  }

  function renderPending(status) {
    const rejected = status === 'rejected';
    root.innerHTML = `<div class="dash-wrap"><div class="container access-denied">
      <i class="fas fa-${rejected?'circle-xmark':'hourglass-half'}" style="font-size:3.5rem;color:${rejected?'#ef4444':'#f59e0b'};"></i>
      <h1>${rejected ? 'Verification rejected' : 'Verification pending'}</h1>
      <p style="max-width:520px;margin:0 auto;">${rejected
        ? 'Your previous ID submission was rejected by our admin team. Please sign up again with a clearer ID to retry verification.'
        : 'An admin is reviewing your ID documents. You\'ll get full access to the landlord dashboard once approved (usually within 24–48 hours).'}</p>
      <div style="margin-top:1.5rem; display:flex; gap:.5rem; justify-content:center; flex-wrap:wrap;">
        <a href="/listings.html" class="btn btn-outline">Browse listings while you wait</a>
        <a href="/login.html" class="btn btn-primary">Retry verification</a>
      </div>
    </div></div>`;
  }

  async function loadMine() {
    const { data, error } = await sb.from('properties').select('*').eq('landlord_id', user.id).order('created_at', { ascending: false });
    if (error) { window.toast.error('Could not load listings: ' + error.message); myListings = []; return; }
    myListings = data || [];
  }




  function renderDashboard() {
    const activeCount = myListings.filter(l => l.status === 'approved').length;
    const pendingCount = myListings.filter(l => l.status === 'pending').length;
    const unseen = notifications.filter(n => !n.seen).length;
    const bulkLocked = !(user.role === 'admin' || user.agency_status === 'approved');
    root.innerHTML = `
      <div class="dash-hero"><div class="container">
        <h1>Welcome back, ${escapeHtml(user.name || 'Landlord')} <i class="fas fa-circle-check" style="font-size:1.1rem; color:#10b981;" title="Verified"></i></h1>
        <p>Manage your properties, view requests and update availability.</p>
      </div></div>
      <div class="container">
        <div class="stats">
          <div class="stat"><div class="num">${activeCount}</div><div class="lbl">Approved</div></div>
          <div class="stat"><div class="num">${pendingCount}</div><div class="lbl">Pending review</div></div>
          <div class="stat"><div class="num">${unseen}</div><div class="lbl">New viewing requests</div></div>
          <div class="stat"><div class="num" id="llAvgRating">—</div><div class="lbl">Avg rating <span id="llRatingStars" style="color:#F59E0B;"></span><span id="llRatingCount" style="color:var(--text-muted); font-weight:400;"></span></div></div>
        </div>

        <div class="panel">
          <h2><i class="fas fa-bell" style="color:var(--primary);"></i> Viewing requests ${unseen?`<span class="badge" style="background:#ef4444;color:#fff;">${unseen} new</span>`:''}</h2>
          <div id="notifList"></div>
        </div>

        <div class="dash-grid">
          <div class="panel">
            <div class="mode-tabs" role="tablist" aria-label="Property add mode">
              <button type="button" class="mode-tab active" data-mode="single" role="tab" aria-selected="true">
                <i class="fas fa-plus-circle"></i> Add Single Property
              </button>
              <button type="button" class="mode-tab" data-mode="bulk" role="tab" aria-selected="false" ${bulkLocked?'disabled title="Available for verified agency accounts only."':''}>
                <i class="fas fa-table"></i> Bulk CSV Upload
                ${bulkLocked?'<i class="fas fa-lock" style="margin-left:.3rem; font-size:.75rem;"></i>':''}
              </button>
            </div>
            <div id="singlePane">
              <h2 id="formTitle"><i class="fas fa-plus-circle" style="color:var(--primary);"></i> Add a new property</h2>
              <form id="propForm" novalidate></form>
            </div>
            <div id="bulkPane" style="display:none;"></div>
          </div>
          <div class="panel">
            <h2><i class="fas fa-list" style="color:var(--primary);"></i> My listings (${myListings.length})</h2>
            <div id="myList"></div>
          </div>
        </div>
      </div>`;
    renderForm();
    renderMine();
    renderNotifs();
    loadAvgRating();
    wireModeTabs(bulkLocked);
  }

  // --- Neighbourhood → coordinates fallback registry (Tanzania) ---
  const NEIGHBOURHOOD_COORDS = {
    'mikocheni':[-6.7654,39.2422],'mwenge':[-6.7681,39.2358],'sinza':[-6.7692,39.2160],
    'kinondoni':[-6.7702,39.2529],'msasani':[-6.7532,39.2749],'oysterbay':[-6.7671,39.2841],
    'masaki':[-6.7444,39.2822],'upanga':[-6.8098,39.2857],'kariakoo':[-6.8199,39.2762],
    'mbezi':[-6.7333,39.1856],'kimara':[-6.7844,39.1611],'tabata':[-6.8353,39.2244],
    'ubungo':[-6.7828,39.2072],'mabibo':[-6.8228,39.2183],'kigamboni':[-6.8353,39.3236],
    'ilala':[-6.8189,39.2794],'temeke':[-6.8494,39.2833],'segerea':[-6.8564,39.1953],
    'arusha':[-3.3869,36.6829],'mwanza':[-2.5164,32.9175],'dodoma':[-6.1730,35.7419],
    'mbeya':[-8.9094,33.4608],'morogoro':[-6.8235,37.6612],'tanga':[-5.0692,39.0989],
    'zanzibar':[-6.1659,39.2026],
  };
  function coordsForNeighbourhood(name) {
    if (!name) return null;
    const key = String(name).trim().toLowerCase().replace(/\s+/g,'');
    return NEIGHBOURHOOD_COORDS[key] || null;
  }

  function wireModeTabs(locked) {
    const tabs = document.querySelectorAll('.mode-tab');
    const single = document.getElementById('singlePane');
    const bulk = document.getElementById('bulkPane');
    tabs.forEach(t => t.addEventListener('click', () => {
      if (t.disabled) return;
      const mode = t.dataset.mode;
      tabs.forEach(x => { x.classList.toggle('active', x===t); x.setAttribute('aria-selected', x===t?'true':'false'); });
      if (mode === 'bulk') {
        single.style.display = 'none';
        bulk.style.display = 'block';
        renderBulkPane();
      } else {
        bulk.style.display = 'none';
        single.style.display = 'block';
      }
    }));
    if (locked) {
      const btn = document.querySelector('.mode-tab[data-mode="bulk"]');
      if (btn) btn.addEventListener('click', () => window.toast?.info('Bulk CSV Upload is available for verified agency accounts only.'));
    }
  }

  let bulkRows = [];
  function renderBulkPane() {
    const pane = document.getElementById('bulkPane');
    pane.innerHTML = `
      <h2><i class="fas fa-table" style="color:var(--primary);"></i> Bulk CSV Upload</h2>
      <p style="color:var(--text-muted); font-size:.9rem; margin:.25rem 0 1rem;">Import multiple listings from a spreadsheet. All imported listings go through moderation review.</p>
      <div style="display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1rem;">
        <button type="button" id="dlTemplate" class="btn btn-outline"><i class="fas fa-download"></i> Download CSV Template</button>
      </div>
      <label class="bulk-drop" id="bulkDrop" for="bulkFile">
        <i class="fas fa-cloud-arrow-up up"></i>
        <div style="font-weight:600;">Drop your .csv here or click to browse</div>
        <div style="font-size:.85rem; color:var(--text-muted); margin-top:.3rem;">Headers: title, price_per_month, description, region, neighbourhood, latitude, longitude, bedrooms, bathrooms, contact_phone, image_urls</div>
        <input type="file" id="bulkFile" accept=".csv,text/csv" />
      </label>
      <div id="bulkPreview" class="bulk-preview" style="display:none;"></div>
      <div style="margin-top:1rem; display:flex; gap:.5rem; justify-content:flex-end;">
        <button type="button" id="processUpload" class="btn btn-primary" disabled><i class="fas fa-cloud-arrow-up"></i> Process Upload</button>
      </div>
    `;
    document.getElementById('dlTemplate').addEventListener('click', downloadTemplate);
    const drop = document.getElementById('bulkDrop');
    const input = document.getElementById('bulkFile');
    input.addEventListener('change', () => input.files[0] && parseCSVFile(input.files[0]));
    ['dragover','dragenter'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('drag'); }));
    ['dragleave','drop'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('drag'); }));
    drop.addEventListener('drop', e => { const f = e.dataTransfer.files[0]; if (f) parseCSVFile(f); });
    document.getElementById('processUpload').addEventListener('click', processBulkUpload);
  }

  function downloadTemplate() {
    const headers = ['title','price_per_month','description','region','neighbourhood','latitude','longitude','bedrooms','bathrooms','contact_phone','image_urls'];
    const example = ['Cozy 2BR near UDSM','450000','Bright apartment with parking','Dar es Salaam','Mikocheni','','','2','1','+255700000000','https://example.com/a.jpg,https://example.com/b.jpg'];
    const csv = headers.join(',') + '\n' + example.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',') + '\n';
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'shf-listings-template.csv'; a.click();
    URL.revokeObjectURL(a.href);
  }

  // Minimal RFC4180-ish CSV parser
  function parseCSV(text) {
    const rows = []; let row = [], field = '', inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (inQuotes) {
        if (c === '"' && text[i+1] === '"') { field += '"'; i++; }
        else if (c === '"') { inQuotes = false; }
        else field += c;
      } else {
        if (c === '"') inQuotes = true;
        else if (c === ',') { row.push(field); field = ''; }
        else if (c === '\n') { row.push(field); rows.push(row); row=[]; field=''; }
        else if (c === '\r') { /* skip */ }
        else field += c;
      }
    }
    if (field.length || row.length) { row.push(field); rows.push(row); }
    return rows.filter(r => r.length && r.some(x => String(x).trim() !== ''));
  }

  function parseCSVFile(file) {
    const reader = new FileReader();
    reader.onload = () => {
      const rows = parseCSV(String(reader.result));
      if (!rows.length) { window.toast.error('CSV is empty.'); return; }
      const headers = rows[0].map(h => h.trim().toLowerCase());
      bulkRows = rows.slice(1).map(r => {
        const o = {}; headers.forEach((h,i) => o[h] = (r[i]||'').trim()); return o;
      });
      renderPreview(headers);
      document.getElementById('processUpload').disabled = bulkRows.length === 0;
    };
    reader.readAsText(file);
  }

  function renderPreview(headers) {
    const el = document.getElementById('bulkPreview');
    el.style.display = 'block';
    const cols = ['title','price_per_month','region','neighbourhood','bedrooms','bathrooms','image_urls'];
    el.innerHTML = `
      <div style="padding:.5rem .75rem; background:var(--bg); font-weight:600; font-size:.85rem;">${bulkRows.length} row${bulkRows.length===1?'':'s'} ready</div>
      <table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
      <tbody>${bulkRows.slice(0,20).map(r=>`<tr>${cols.map(c=>`<td>${escapeHtml((r[c]||'').substring(0,50))}</td>`).join('')}</tr>`).join('')}</tbody></table>
      ${bulkRows.length>20?`<div style="padding:.4rem .75rem; color:var(--text-muted); font-size:.8rem;">…and ${bulkRows.length-20} more</div>`:''}
    `;
  }

  async function processBulkUpload() {
    const btn = document.getElementById('processUpload');
    if (!bulkRows.length) return;
    btn.disabled = true;
    const original = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Importing…';
    try {
      const payload = bulkRows.map(r => {
        let lat = parseFloat(r.latitude), lng = parseFloat(r.longitude);
        if (isNaN(lat) || isNaN(lng)) {
          const c = coordsForNeighbourhood(r.neighbourhood);
          if (c) { lat = c[0]; lng = c[1]; }
        }
        const imgs = (r.image_urls || '').split(',').map(s => s.trim()).filter(Boolean);
        const city = r.region || null;
        const area = r.neighbourhood || null;
        return {
          landlord_id: user.id,
          status: 'pending',
          title: r.title || 'Untitled listing',
          description: r.description || null,
          price: +r.price_per_month || 0,
          city,
          neighbourhood: area,
          address: area ? `${area}, ${city||''}`.replace(/,\s*$/,'') : (city || ''),
          beds: +r.bedrooms || 0,
          baths: +r.bathrooms || 0,
          contact_phone: r.contact_phone || null,
          lat: isNaN(lat) ? null : lat,
          lng: isNaN(lng) ? null : lng,
          image_urls: imgs,
        };
      }).filter(p => p.title && p.price > 0);
      if (!payload.length) throw new Error('No valid rows to import. Check required columns (title, price_per_month).');
      const { error } = await sb.from('properties').insert(payload);
      if (error) throw error;
      window.toast.success('Successfully imported listings into the database moderation queue.');
      bulkRows = [];
      await loadMine();
      renderDashboard();
    } catch (err) {
      window.toast.error(err.message || 'Bulk import failed.');
      btn.disabled = false; btn.innerHTML = original;
    }
  }

  async function loadAvgRating() {
    try {
      const rating = await SHF.getLandlordRating(user.id);
      const numEl = document.getElementById('llAvgRating');
      const starsEl = document.getElementById('llRatingStars');
      const cntEl = document.getElementById('llRatingCount');
      if (!numEl) return;
      if (!rating.count) { numEl.textContent = '—'; starsEl.textContent = ''; cntEl.textContent = ' (no reviews yet)'; return; }
      numEl.textContent = rating.avg.toFixed(1);
      starsEl.textContent = ' ' + SHF.starString(rating.avg);
      cntEl.textContent = ` · ${rating.count} review${rating.count==1?'':'s'}`;
    } catch (e) {}
  }

  function escapeHtml(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  async function loadNotifications() {
    const { data, error } = await sb
      .from('viewing_requests')
      .select('id, contact_phone, message, seen, created_at, property_id, renter_id, landlord_response, responded_at, properties:property_id(title)')
      .eq('landlord_id', user.id)
      .order('created_at', { ascending: false })
      .limit(50);
    if (!error) notifications = data || [];
  }

  function renderNotifs() {
    const el = document.getElementById('notifList');
    if (!notifications.length) {
      el.innerHTML = `<div style="color:var(--text-muted); font-size:.9rem;">No viewing requests yet.</div>`;
      return;
    }
    el.innerHTML = notifications.map(n => `
      <div class="notif ${n.seen?'':'new'}" data-id="${n.id}" style="border-left:4px solid ${n.responded_at?'#10b981':n.seen?'#94a3b8':'#3b82f6'}; padding-left:.85rem;">
        <div class="who">📞 ${escapeHtml(n.contact_phone)} requested a viewing</div>
        <div style="font-size:.85rem; margin:.2rem 0;">on <strong>${escapeHtml(n.properties?.title || 'a property')}</strong>${n.message?` — "${escapeHtml(n.message)}"`:''}</div>
        <div class="when">${new Date(n.created_at).toLocaleString()}</div>
        ${n.responded_at
          ? `<div style="margin-top:.5rem; padding:.5rem .65rem; background:rgba(16,185,129,.1); border-radius:8px; font-size:.85rem;"><i class="fas fa-circle-check" style="color:#10b981;"></i> <strong>You replied:</strong> ${escapeHtml(n.landlord_response||'')}</div>`
          : `<div style="margin-top:.5rem; display:flex; gap:.4rem; flex-wrap:wrap;">
               <textarea data-reply-input="${n.id}" rows="2" placeholder="Reply to the renter (e.g. 'Confirmed — meet Sat 10am. I'll call you.')" style="flex:1; min-width:240px; padding:.5rem; border:1px solid var(--border); border-radius:8px; font-family:inherit; font-size:.85rem;"></textarea>
               <button class="btn btn-primary" data-reply="${n.id}" style="padding:.45rem .9rem; font-size:.85rem;"><i class="fas fa-paper-plane"></i> Send reply</button>
             </div>`}
      </div>`).join('');
    el.querySelectorAll('[data-reply]').forEach(b => b.addEventListener('click', async () => {
      const id = b.dataset.reply;
      const ta = el.querySelector(`[data-reply-input="${id}"]`);
      const msg = (ta?.value || '').trim();
      if (!msg) { window.toast.error('Write a short message first.'); return; }
      b.disabled = true;
      const { error } = await sb.rpc('respond_viewing_request', { _req: id, _message: msg });
      if (error) { window.toast.error(error.message); b.disabled = false; return; }
      window.toast.success('Reply sent — the renter will get a notification.');
      await loadNotifications(); renderDashboard();
    }));
  }


  function renderForm(prefill) {
    const f = document.getElementById('propForm');
    const v = prefill || {};
    const selectedAmenities = new Set(v.amenities || []);
    document.getElementById('formTitle').innerHTML = prefill
      ? '<i class="fas fa-pen" style="color:var(--primary);"></i> Edit property'
      : '<i class="fas fa-plus-circle" style="color:var(--primary);"></i> Add a new property';

    f.innerHTML = `
      <div class="form-row"><label>Property title *</label><input id="p-title" type="text" value="${escapeHtml(v.title||'')}" required /><span class="error"></span></div>
      <div class="grid-2">
        <div class="form-row"><label>City *</label><input id="p-city" type="text" value="${escapeHtml(v.city||'')}" required /><span class="error"></span></div>
        <div class="form-row"><label>Neighbourhood</label><input id="p-area" type="text" value="${escapeHtml(v.neighbourhood||'')}" /></div>
      </div>
      <div class="grid-3">
        <div class="form-row"><label>Rent / month (TSh) *</label><input id="p-price" type="number" min="10000" step="10000" value="${v.price||''}" required /><span class="error"></span></div>
        <div class="form-row"><label>Bedrooms *</label><input id="p-beds" type="number" min="0" max="20" value="${v.beds||1}" required /></div>
        <div class="form-row"><label>Bathrooms *</label><input id="p-baths" type="number" min="0" max="20" value="${v.baths||1}" required /></div>
      </div>
      <div class="grid-2">
        <div class="form-row"><label>Size (sqm) <small style="color:var(--text-muted);">— optional</small></label><input id="p-size" type="number" min="5" value="${v.size_sqm||''}" /></div>
        <div class="form-row"><label>Property type</label>
          <select id="p-type">
            ${['Apartment','Studio','Single room','Shared house','Townhouse','Bungalow','Penthouse'].map(o=>`<option ${v.property_type===o?'selected':''}>${o}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="grid-2">
        <div class="form-row"><label>Furnishing</label>
          <select id="p-furn">
            ${['Furnished','Semi-furnished','Unfurnished'].map(o=>`<option ${v.furnishing===o?'selected':''}>${o}</option>`).join('')}
          </select>
        </div>
        <div class="form-row"><label>Available from</label><input id="p-avail" type="date" value="${v.available_from||''}" /></div>
      </div>
      <div class="form-row"><label>Occupancy status</label>
        <select id="p-occ">
          <option value="vacant" ${v.occupancy!=='occupied'?'selected':''}>🟢 Vacant — available to rent</option>
          <option value="occupied" ${v.occupancy==='occupied'?'selected':''}>🔴 Occupied — currently rented</option>
        </select>
      </div>
      <div class="form-row"><label>Amenities <small style="color:var(--text-muted);">— only selected ones are shown to renters</small></label>
        <div class="amenity-chips">
          ${['Wi-Fi','Parking','Security','Water tank','Generator','Air conditioning','Kitchen','Laundry','Pet friendly','Garden','Balcony','Furnished'].map(a =>
            `<label><input type="checkbox" name="amenity" value="${a}" ${selectedAmenities.has(a)?'checked':''}><span>${a}</span></label>`).join('')}
        </div>
      </div>
      <div class="grid-2">
        <div class="form-row"><label>Latitude <small style="color:var(--text-muted);">— supports decimals & negatives</small></label><input id="p-lat" type="number" step="any" placeholder="-6.7741" value="${v.lat??''}" /></div>
        <div class="form-row"><label>Longitude</label><input id="p-lng" type="number" step="any" placeholder="39.2417" value="${v.lng??''}" /></div>
      </div>
      <div class="form-row"><label>Description <span style="color:var(--text-muted); font-weight:400; font-size:.85em;">(optional — required if you don't upload any photos or a video)</span></label><textarea id="p-desc" rows="4" maxlength="800" placeholder="Additional information about the property — neighbourhood, rules, nearby amenities, anything renters should know.">${escapeHtml(v.description||'')}</textarea><span class="error"></span></div>
      <p style="font-size:.85rem; color:var(--text-muted); margin:.25rem 0 .5rem;"><i class="fas fa-circle-info"></i> Photos and video are both optional, but you must provide at least one of: photos, a video, or a written description.</p>
      <div class="form-row">
        <label>Property photos <span style="color:var(--text-muted); font-weight:400; font-size:.85em;">(optional, up to 8)</span></label>
        <label class="file-input-wrap" for="p-photos">
          <i class="fas fa-camera-retro" style="font-size:1.5rem; color:var(--primary);"></i>
          <div>Click to upload photos — JPG or PNG (max 3MB each)</div>
          <input id="p-photos" type="file" accept="image/*" multiple />
        </label>
        <div class="preview-grid" id="photoPreview"></div>
        <span class="error"></span>
      </div>
      <div class="form-row">
        <label>Property video <span style="color:var(--text-muted); font-weight:400; font-size:.85em;">(optional, max 100MB — MP4/WebM/MOV)</span></label>
        <label class="file-input-wrap" for="p-video">
          <i class="fas fa-video" style="font-size:1.5rem; color:var(--primary);"></i>
          <div>Click to upload a short video tour of the house</div>
          <input id="p-video" type="file" accept="video/*" />
        </label>
        <div id="videoPreview" style="margin-top:.5rem;"></div>
        <span class="error"></span>
      </div>

      <div class="grid-2">
        <div class="form-row"><label>Contact phone</label><input id="p-contact" type="tel" placeholder="+255759996841" value="${escapeHtml(v.contact_phone||'')}" /></div>
        <div class="form-row"><label>Deposit (months)</label><input id="p-deposit" type="number" min="0" max="12" value="${v.deposit_months??2}" /></div>
      </div>
      <div style="display:flex; gap:.5rem; margin-top:.75rem;">
        <button type="submit" id="publishBtn" class="btn btn-primary" style="flex:1; justify-content:center;">
          <i class="fas fa-cloud-arrow-up"></i> ${prefill?'Save changes':'Publish listing'}
        </button>
        ${prefill?'<button type="button" id="cancelEdit" class="btn btn-outline">Cancel</button>':''}
      </div>`;

    existingPhotoUrls = Array.isArray(v.image_urls) ? [...v.image_urls] : [];
    pendingPhotos = [];
    existingVideoPath = v.video_url || null;
    pendingVideo = null;
    bindForm();

    if (prefill && document.getElementById('cancelEdit')) {
      document.getElementById('cancelEdit').addEventListener('click', () => { editingId = null; renderForm(); });
    }
  }

  function drawPreviews() {
    const preview = document.getElementById('photoPreview');
    const existHtml = existingPhotoUrls.map((url, i) =>
      `<div class="ph"><img src="${escapeHtml(url)}" alt=""><button type="button" data-rmexist="${i}" aria-label="Remove">✕</button></div>`).join('');
    const newHtml = pendingPhotos.map((p, i) =>
      `<div class="ph"><img src="${p.dataUrl}" alt=""><button type="button" data-rmnew="${i}" aria-label="Remove">✕</button></div>`).join('');
    preview.innerHTML = existHtml + newHtml;
    preview.querySelectorAll('[data-rmexist]').forEach(b => b.addEventListener('click', () => { existingPhotoUrls.splice(+b.dataset.rmexist, 1); drawPreviews(); }));
    preview.querySelectorAll('[data-rmnew]').forEach(b => b.addEventListener('click', () => { pendingPhotos.splice(+b.dataset.rmnew, 1); drawPreviews(); }));
  }

  function drawVideoPreview() {
    const el = document.getElementById('videoPreview');
    if (!el) return;
    if (pendingVideo) {
      const url = URL.createObjectURL(pendingVideo.file);
      el.innerHTML = `<div style="display:flex; align-items:center; gap:.75rem; flex-wrap:wrap;">
        <video src="${url}" controls style="max-width:320px; max-height:200px; border-radius:8px; background:#000;"></video>
        <div><div style="font-size:.9rem;">${escapeHtml(pendingVideo.name)}</div>
        <button type="button" id="rmVideo" class="btn btn-outline" style="margin-top:.4rem;">Remove video</button></div></div>`;
      document.getElementById('rmVideo').addEventListener('click', () => { pendingVideo = null; document.getElementById('p-video').value=''; drawVideoPreview(); });
    } else if (existingVideoPath) {
      el.innerHTML = `<div style="display:flex; align-items:center; gap:.75rem; flex-wrap:wrap;">
        <i class="fas fa-circle-check" style="color:var(--success);"></i>
        <span style="font-size:.9rem;">Existing video attached</span>
        <button type="button" id="rmVideoExisting" class="btn btn-outline">Remove video</button></div>`;
      document.getElementById('rmVideoExisting').addEventListener('click', () => { existingVideoPath = null; drawVideoPreview(); });
    } else {
      el.innerHTML = '';
    }
  }

  function bindForm() {
    const photosInput = document.getElementById('p-photos');
    drawPreviews();
    drawVideoPreview();

    photosInput.addEventListener('change', async () => {
      const files = Array.from(photosInput.files || []);
      for (const file of files) {
        if ((existingPhotoUrls.length + pendingPhotos.length) >= 8) break;
        if (file.size > 3 * 1024 * 1024) { window.toast.error(`${file.name} is over 3MB and was skipped.`); continue; }
        const dataUrl = await new Promise(res => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(file); });
        pendingPhotos.push({ name: file.name, file, dataUrl });
      }
      photosInput.value = '';
      drawPreviews();
    });

    const videoInput = document.getElementById('p-video');
    videoInput.addEventListener('change', () => {
      const file = (videoInput.files || [])[0];
      if (!file) return;
      if (!/^video\//.test(file.type)) { window.toast.error('Please select a video file.'); videoInput.value=''; return; }
      if (file.size > 100 * 1024 * 1024) { window.toast.error('Video is over 100MB. Please pick a smaller file.'); videoInput.value=''; return; }
      pendingVideo = { name: file.name, file };
      drawVideoPreview();
    });


    document.getElementById('propForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.querySelectorAll('#propForm .error').forEach(el => el.textContent = '');
      const get = id => document.getElementById(id).value.trim();
      const setErr = (id, m) => { const f = document.getElementById(id); const er = f.parentElement.querySelector('.error'); if (er) er.textContent = m; };
      let ok = true;
      if (!get('p-title')) { setErr('p-title','Title is required'); ok = false; }
      if (!get('p-city')) { setErr('p-city','City is required'); ok = false; }
      if (!get('p-price') || +get('p-price') < 10000) { setErr('p-price','Enter a valid rent'); ok = false; }
      // Need at least one of: photos, video, or description
      const hasPhotos = (existingPhotoUrls.length + pendingPhotos.length) > 0;
      const hasVideo = !!(pendingVideo || existingVideoPath);
      const hasDesc = !!get('p-desc');
      if (!hasPhotos && !hasVideo && !hasDesc) {
        setErr('p-desc','Please add at least one photo, a video, or a written description');
        setErr('p-photos','Add photos, a video, or write a description');
        ok = false;
      }
      const phone = get('p-contact');
      if (phone && !/^\+255\d{9}$/.test(phone)) { setErr('p-contact','Phone must be +255 followed by 9 digits'); ok = false; }
      if (!ok) return;

      const btn = document.getElementById('publishBtn');
      const original = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving…';

      try {
        const amenities = Array.from(document.querySelectorAll('input[name="amenity"]:checked')).map(c => c.value);
        const city = get('p-city'), area = get('p-area');
        const address = area ? `${area}, ${city}` : city;
        const latRaw = parseFloat(get('p-lat')), lngRaw = parseFloat(get('p-lng'));

        // Upload new photos
        const ts = Date.now();
        const newUrls = [];
        for (let i = 0; i < pendingPhotos.length; i++) {
          const p = pendingPhotos[i];
          const safeName = p.name.replace(/[^a-zA-Z0-9._-]/g, '_');
          const path = `${user.id}/${ts}-${i}-${safeName}`;
          const { error: upErr } = await sb.storage.from('property-photos').upload(path, p.file, { contentType: p.file.type || 'image/jpeg' });
          if (upErr) throw upErr;
          const { data: pub } = sb.storage.from('property-photos').getPublicUrl(path);
          newUrls.push(pub.publicUrl);
        }

        // Upload new video (if any)
        let videoPath = existingVideoPath;
        if (pendingVideo) {
          const safeVidName = pendingVideo.name.replace(/[^a-zA-Z0-9._-]/g, '_');
          const vPath = `${user.id}/${ts}-${safeVidName}`;
          const { error: vErr } = await sb.storage.from('property-videos').upload(vPath, pendingVideo.file, { contentType: pendingVideo.file.type || 'video/mp4', upsert: false });
          if (vErr) throw vErr;
          videoPath = vPath;
        }

        const payload = {
          title: get('p-title'),
          description: get('p-desc'),
          address,
          price: +get('p-price'),
          city,
          neighbourhood: area || null,
          furnishing: document.getElementById('p-furn').value,
          beds: +get('p-beds') || 0,
          baths: +get('p-baths') || 0,
          size_sqm: get('p-size') ? +get('p-size') : null,
          deposit_months: +get('p-deposit') || 0,
          available_from: get('p-avail') || null,
          contact_phone: phone || null,
          lat: isNaN(latRaw) ? null : latRaw,
          lng: isNaN(lngRaw) ? null : lngRaw,
          amenities,
          image_urls: [...existingPhotoUrls, ...newUrls],
          video_url: videoPath,
          property_type: document.getElementById('p-type').value,
          occupancy: document.getElementById('p-occ').value,
        };


        if (editingId) {
          const { error } = await sb.from('properties').update(payload).eq('id', editingId);
          if (error) throw error;
          window.toast.success('Listing updated!');
        } else {
          payload.landlord_id = user.id;
          payload.status = 'pending';
          const { error } = await sb.from('properties').insert(payload);
          if (error) throw error;
          window.toast.success('Listing submitted for review!');
        }
        editingId = null;
        await loadMine();
        renderDashboard();
      } catch (err) {
        window.toast.error(err.message || 'Could not save listing.');
        btn.disabled = false;
        btn.innerHTML = original;
      }
    });
  }

  function renderMine() {
    const list = document.getElementById('myList');
    if (!myListings.length) {
      list.innerHTML = `<div class="empty-state"><i class="fas fa-inbox" style="font-size:2.5rem;color:var(--primary);opacity:.5;"></i><p>No listings yet. Add your first property using the form.</p></div>`;
      return;
    }
    const fmt = n => 'TSh ' + Number(n).toLocaleString();
    const statusBadge = s => {
      const c = s === 'approved' ? '#10b981' : s === 'rejected' ? '#ef4444' : '#f59e0b';
      return `<span style="font-size:.7rem;padding:.15rem .5rem;border-radius:10px;background:${c}22;color:${c};font-weight:600;text-transform:uppercase;">${s}</span>`;
    };
    const occBadge = o => {
      const isOcc = o === 'occupied';
      return `<span style="font-size:.7rem;padding:.15rem .5rem;border-radius:10px;background:${isOcc?'#FEE2E2':'#DCFCE7'};color:${isOcc?'#B91C1C':'#166534'};font-weight:600;">${isOcc?'🔴 Occupied':'🟢 Vacant'}</span>`;
    };
    list.innerHTML = myListings.map(l => `
      <div class="my-listing">
        ${(l.image_urls && l.image_urls[0]) ? `<img src="${l.image_urls[0]}" alt="${escapeHtml(l.title)}">` : `<div style="width:96px; height:96px; flex-shrink:0; border-radius:8px; background:linear-gradient(135deg,#1E3A8A,#3B82F6); display:flex; align-items:center; justify-content:center; color:#fff;"><i class="fas ${l.video_url ? 'fa-circle-play' : 'fa-house'}" style="font-size:1.6rem;"></i></div>`}
        <div class="info">
          <h4>${escapeHtml(l.title)} ${statusBadge(l.status)} ${occBadge(l.occupancy)}</h4>
          <div class="meta">${fmt(l.price)} / month · ${l.beds || '-'} bd · ${escapeHtml(l.city || l.address || '')}</div>
          <div style="font-size:.78rem; color:var(--text-muted); margin-top:.25rem;"><i class="fas fa-clock"></i> Listed ${SHF.timeAgo(l.created_at)}</div>
          <label style="display:inline-flex;align-items:center;gap:.35rem;font-size:.8rem;margin-top:.3rem;cursor:pointer;">
            <input type="checkbox" data-occ="${l.id}" ${l.occupancy==='occupied'?'checked':''} /> Mark as occupied (rented)
          </label>
        </div>
        <div class="actions">
          <button data-view="${l.id}" title="View / edit"><i class="fas fa-eye"></i></button>
          <button data-edit="${l.id}" title="Edit"><i class="fas fa-pen"></i></button>
          <button class="del" data-del="${l.id}" title="Delete"><i class="fas fa-trash"></i></button>
        </div>
      </div>`).join('');

    list.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', async () => {
      if (!confirm('Delete this listing?')) return;
      const { error } = await sb.from('properties').delete().eq('id', b.dataset.del);
      if (error) { window.toast.error(error.message); return; }
      window.toast.success('Listing deleted.');
      await loadMine(); renderDashboard();
    }));
    list.querySelectorAll('[data-edit], [data-view]').forEach(b => b.addEventListener('click', () => {
      const id = b.dataset.edit || b.dataset.view;
      const item = myListings.find(x => x.id === id);
      if (!item) return;
      editingId = id;
      renderForm(item);
      document.getElementById('propForm').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }));
    list.querySelectorAll('[data-occ]').forEach(c => c.addEventListener('change', async () => {
      const id = c.dataset.occ;
      const next = c.checked ? 'occupied' : 'vacant';
      const { error } = await sb.from('properties').update({ occupancy: next }).eq('id', id);
      if (error) { window.toast.error(error.message); c.checked = !c.checked; return; }
      window.toast.success(`Marked as ${next}.`);
      await loadMine();
    }));
  }
</script>
</body>
</html>
