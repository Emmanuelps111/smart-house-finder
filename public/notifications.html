<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications · MakaziLink</title>
  <meta name="description" content="Your notifications: roommate matches, landlord replies, and platform announcements." />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    main.notif-wrap { flex: 1; margin-top: var(--header-h); padding-top: 2rem; }
    .notif-wrap { max-width: 760px; margin: 0 auto; padding: 1.5rem 1rem 4rem; width: 100%; }
    .notif-hero {
      background: linear-gradient(135deg,#2563eb,#3b82f6,#06b6d4);
      color:#fff; border-radius:18px; padding:1.5rem 1.6rem; margin-bottom:1.2rem;
      box-shadow:0 10px 30px -10px rgba(37,99,235,.5);
      display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap;
      position: relative; overflow: hidden;
    }
    .notif-hero h1{margin:0;font-size:1.4rem;display:flex;align-items:center;gap:.55rem; color:#fff; text-shadow: 0 1px 2px rgba(0,0,0,.2);}
    .notif-hero p{margin:.25rem 0 0;opacity:.95;font-size:.9rem; color:#fff;}
    .notif-hero .btn{background:#fff;color:#2563eb;border:none;padding:.55rem 1rem;border-radius:10px;font-weight:600;cursor:pointer;}
    .notif-hero .btn:hover{background:#eff6ff;}
    .notif-card{
      background:var(--surface); border:1px solid var(--border); border-radius:14px;
      padding:1rem 1.1rem; margin-bottom:.7rem; display:flex; gap:.9rem; align-items:flex-start;
      transition:transform .15s, box-shadow .15s; box-shadow:0 4px 16px rgba(0,0,0,.08);
      position: relative; z-index: 1;
    }
    [data-theme="dark"] .notif-card { background: var(--surface); box-shadow: 0 4px 20px rgba(0,0,0,.4); }
    .notif-card:hover{transform:translateY(-1px); box-shadow:0 8px 24px -12px rgba(0,0,0,.18);}
    .notif-card.unread{border-left:4px solid #3b82f6; background:linear-gradient(90deg,rgba(59,130,246,.08),transparent 30%);}
    .notif-icon{
      width:42px; height:42px; border-radius:12px; flex-shrink:0;
      display:grid; place-items:center; color:#fff; font-size:1.05rem;
    }
    .ic-announcement{background:linear-gradient(135deg,#8b5cf6,#6366f1);}
    .ic-roommate_match{background:linear-gradient(135deg,#10b981,#06b6d4);}
    .ic-viewing_response{background:linear-gradient(135deg,#f59e0b,#ef4444);}
    .ic-system{background:linear-gradient(135deg,#3b82f6,#0ea5e9);}
    .notif-body{flex:1; min-width:0;}
    .notif-title{font-weight:700; color:var(--text); margin:0 0 .15rem; font-size:.97rem; letter-spacing: -.01em;}
    .notif-msg{font-size:.89rem; color:var(--text-muted); margin:0; line-height:1.5; word-wrap:break-word; font-weight: 500;}
    .notif-time{font-size:.75rem; color:var(--text-muted); margin-top:.35rem; display:block; font-weight: 500;}
    .notif-actions{display:flex; gap:.4rem; align-items:center; flex-shrink:0;}
    .notif-actions button{background:var(--surface); border:1px solid var(--border); color:var(--text-muted); padding:.35rem .55rem; border-radius:8px; cursor:pointer; font-size:.8rem; transition: all .15s;}
    .notif-actions button:hover{color:#ef4444; border-color:#ef4444; background: rgba(239,68,68,.08);}
    .empty{
      text-align:center; padding:3rem 1rem; color:var(--text);
      background:var(--surface); border:1px dashed var(--border); border-radius:14px; font-weight: 500;
    }
    .empty i{font-size:2.5rem; color:#3b82f6; margin-bottom:.6rem;}
    .site-footer { margin-top: auto; background: var(--surface); border-top: 1px solid var(--border); }
    @media (max-width:520px){ .notif-card{padding:.85rem;} .notif-icon{width:36px;height:36px;} .notif-wrap { padding-top: 1rem; } }
  </style>
</head>
<body>
  <div id="header-mount"></div>

  <main class="notif-wrap">
    <div class="notif-hero">
      <div>
        <h1><i class="fas fa-bell"></i> Notifications</h1>
        <p id="notifSubtitle">Updates about your activity will appear here.</p>
      </div>
      <button class="btn" id="markAllBtn"><i class="fas fa-check-double"></i> Mark all read</button>
    </div>
    <div id="notifList"><div class="empty"><i class="fas fa-spinner fa-spin"></i><div>Loading…</div></div></div>
  </main>

  <div id="footer-mount"></div>
  <script src="/js/cloud.js"></script>
  <script src="/partials.js"></script>
  <script src="/js/app.js"></script>
  <script>
    (async () => {
      const list = document.getElementById('notifList');
      const markBtn = document.getElementById('markAllBtn');
      const subtitle = document.getElementById('notifSubtitle');
      const showEmpty = (icon, msg) => { list.innerHTML = `<div class="empty"><i class="${icon}"></i><div>${msg}</div></div>`; };

      let sb, user;
      try {
        sb = await Promise.race([
          window.SHFCloud.ready,
          new Promise((_, rej) => setTimeout(() => rej(new Error('Connection timeout')), 8000))
        ]);
        const sess = await sb.auth.getSession();
        user = sess.data.session && sess.data.session.user;
      } catch (e) {
        console.error('[notifications] init failed', e);
        showEmpty('fas fa-triangle-exclamation', "Couldn't connect. Please refresh the page.");
        markBtn.style.display = 'none';
        return;
      }

      if (!user) {
        showEmpty('fas fa-lock', 'Please <a href="/login.html" style="color:#3b82f6;">sign in</a> to view your notifications.');
        subtitle.textContent = 'Sign in to see your activity.';
        markBtn.style.display = 'none';
        return;
      }

      const esc = s => (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
      const ago = ts => {
        const d = (Date.now() - new Date(ts).getTime())/1000;
        if (d < 60) return 'just now';
        if (d < 3600) return Math.floor(d/60) + 'm ago';
        if (d < 86400) return Math.floor(d/3600) + 'h ago';
        if (d < 2592000) return Math.floor(d/86400) + 'd ago';
        return new Date(ts).toLocaleDateString();
      };
      const iconFor = t => ({
        announcement: 'bullhorn',
        roommate_match: 'user-group',
        viewing_response: 'calendar-check',
      }[t] || 'circle-info');

      async function load() {
        try {
          const { data, error } = await sb.from('notifications')
            .select('*').eq('user_id', user.id).order('created_at', { ascending: false }).limit(100);
          if (error) { showEmpty('fas fa-triangle-exclamation', "Couldn't load: " + esc(error.message)); return; }
          if (!data || !data.length) {
            showEmpty('far fa-bell-slash', "No notifications for you yet. We'll let you know when something arrives.");
            subtitle.textContent = "You're all caught up.";
            return;
          }
          const unread = data.filter(n => !n.read).length;
          subtitle.textContent = unread ? `${unread} unread · ${data.length} total` : `${data.length} notifications`;
          // For any connect requests, prefetch sender profiles via a SECURITY DEFINER RPC.
          // RLS on `profiles` blocks direct reads of other users' rows, so we call
          // `get_roommate_sender_public` which only returns a sender's public bits
          // when they've actually sent the current user a connect request.
          const connectSenderIds = Array.from(new Set(
            data.filter(n => typeof n.type === 'string' && n.type.startsWith('roommate_connect_request:'))
                .map(n => n.type.split(':')[1]).filter(Boolean)
          ));
          const senderMap = {};
          if (connectSenderIds.length){
            const results = await Promise.all(
              connectSenderIds.map(sid => sb.rpc('get_roommate_sender_public', { _sender: sid }))
            );
            results.forEach((res, i) => {
              const row = res && res.data && res.data[0];
              if (row) senderMap[connectSenderIds[i]] = row;
            });
          }

          list.innerHTML = data.map(n => {
            const isConnect = typeof n.type === 'string' && n.type.startsWith('roommate_connect_request:');
            const iconKey = isConnect ? 'roommate_match' : n.type;
            const senderId = isConnect ? n.type.split(':')[1] : '';
            let actionHtml = '';
            if (isConnect){
              const sp = senderMap[senderId] || {};
              const tags = Array.isArray(sp.habit_tags) ? sp.habit_tags : [];
              const tagChips = tags.map(t => `<span style="display:inline-block; padding:.15rem .55rem; border-radius:9999px; background:rgba(59,130,246,.12); color:#1d4ed8; font-size:.72rem; font-weight:600;">${esc(t)}</span>`).join(' ');
              const courseLine = [sp.course_major, sp.home_campus].filter(Boolean).map(esc).join(' — ');
              actionHtml = `
                <div class="connect-intro" style="margin-top:.6rem; padding:.85rem 1rem; border-radius:16px; background:rgba(255,255,255,.85); border:1px solid rgba(148,163,184,.35); box-shadow:inset 0 1px 0 rgba(255,255,255,.5);">
                  <div style="display:flex; align-items:center; gap:.5rem; flex-wrap:wrap; margin-bottom:.35rem;">
                    <strong style="font-size:.95rem; color:#0f172a;">${esc(sp.full_name || 'Student')}</strong>
                    ${sp.gender ? `<span style="font-size:.72rem; padding:.15rem .55rem; border-radius:9999px; background:rgba(15,23,42,.06); color:#334155; font-weight:600;">👤 ${esc(sp.gender)}</span>` : ''}
                  </div>
                  ${courseLine ? `<div style="font-size:.8rem; color:#64748b; display:flex; align-items:center; gap:.35rem; margin-bottom:.4rem;"><i class="fas fa-graduation-cap" style="color:#3B82F6;"></i><span>${courseLine}</span></div>` : ''}
                  ${tagChips ? `<div style="display:flex; flex-wrap:wrap; gap:.3rem; margin-bottom:.55rem;">${tagChips}</div>` : ''}
                  <div style="display:flex; flex-wrap:wrap; gap:.4rem;">
                    <button class="btn btn-primary" data-accept="${esc(senderId)}" data-notif="${n.id}" style="font-size:.8rem; padding:.4rem .9rem; border-radius:9999px; background:#3B82F6;"><i class="fas fa-check"></i> Accept &amp; share contact</button>
                    <button data-decline-mute="${n.id}" data-sender="${esc(senderId)}" style="font-size:.8rem; padding:.4rem .9rem; border-radius:9999px; background:rgba(255,255,255,.85); border:1px solid rgba(239,68,68,.4); color:#dc2626; cursor:pointer; font-weight:600;">🔴 Decline &amp; Mute</button>
                  </div>
                </div>`;
            }
            return `
            <div class="notif-card ${n.read?'':'unread'}" data-id="${n.id}" data-link="${esc(n.link||'')}">
              <div class="notif-icon ic-${esc(iconKey)}"><i class="fas fa-${iconFor(iconKey)}"></i></div>
              <div class="notif-body">
                <p class="notif-title">${esc(n.title)}</p>
                <p class="notif-msg">${esc(n.body||'')}</p>
                ${actionHtml}
                <span class="notif-time">${ago(n.created_at)}</span>
              </div>
              <div class="notif-actions">
                <button data-del="${n.id}" title="Delete"><i class="fas fa-trash"></i></button>
              </div>
            </div>`;
          }).join('');
          list.querySelectorAll('.notif-card').forEach(c => {
            c.addEventListener('click', async (e) => {
              if (e.target.closest('[data-del]') || e.target.closest('[data-accept]') || e.target.closest('[data-decline-mute]')) return;
              const id = c.dataset.id, link = c.dataset.link;
              if (c.classList.contains('unread')) {
                await sb.from('notifications').update({ read: true }).eq('id', id);
              }
              if (link) location.href = link;
            });
          });
          list.querySelectorAll('[data-accept]').forEach(b => b.addEventListener('click', async (e) => {
            e.stopPropagation();
            const sender = b.dataset.accept;
            const notifId = b.dataset.notif;
            b.disabled = true;
            const { error } = await sb.rpc('accept_roommate_connect', { _sender: sender });
            if (error){ window.toast.error(error.message || 'Could not accept.'); b.disabled = false; return; }
            await sb.from('notifications').update({ read: true }).eq('id', notifId);
            window.toast.success('Accepted! Contacts have been shared with both of you.');
            load();
          }));
          list.querySelectorAll('[data-decline-mute]').forEach(b => b.addEventListener('click', async (e) => {
            e.stopPropagation();
            const notifId = b.getAttribute('data-decline-mute');
            const senderId = b.getAttribute('data-sender');
            b.disabled = true;
            // Silent decline: quietly remove the notification from THIS user's view.
            // No rejection notification is sent back to the sender — the request
            // vanishes without creating a discouraging experience.
            await sb.from('notifications').delete().eq('id', notifId);
            load();
          }));
          list.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', async (e) => {
            e.stopPropagation();
            const id = b.dataset.del;
            await sb.from('notifications').delete().eq('id', id);
            load();
          }));
        } catch (e) {
          console.error('[notifications] load failed', e);
          showEmpty('fas fa-triangle-exclamation', "Something went wrong loading your inbox. Please try again.");
        }
      }

      markBtn.addEventListener('click', async () => {
        await sb.rpc('mark_all_notifications_read');
        window.toast.success('All notifications marked as read');
        load();
      });

      load();
    })();
  </script>
</body>
</html>
