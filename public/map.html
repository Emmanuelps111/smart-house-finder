<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Map View — Smart House Finder</title>
<meta name="description" content="Explore rental properties on an interactive map." />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
<div id="header-mount"></div>

<div class="map-layout">
  <aside class="map-sidebar">
    <h2 style="font-size:1.25rem; margin-bottom:.25rem;">Listings on map</h2>
    <p style="font-size:.85rem;">Click a card or marker to focus the location.</p>
    <div id="mapList"></div>
  </aside>
  <div id="map" role="application" aria-label="Property map"></div>
</div>

<div id="footer-mount"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/js/cloud.js"></script>
<script src="/js/data.js"></script>
<script src="/partials.js"></script>
<script src="/js/app.js"></script>
<script>
  const map = L.map('map').setView([-6.5, 35.5], 6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors', maxZoom: 19
  }).addTo(map);

  let markers = {};
  function renderMap() {
    Object.values(markers).forEach(m => map.removeLayer(m));
    markers = {};
    SHF_LISTINGS.forEach(l => {
      if (l.lat == null || l.lng == null) return;
      const m = L.marker([l.lat, l.lng]).addTo(map)
        .bindPopup(`<strong>${l.title}</strong><br/>${SHF.formatPrice(l.price)}/month<br/>${l.city}<br/><a href="/detail.html?id=${l.id}">View details →</a>`);
      markers[l.id] = m;
    });

    document.getElementById('mapList').innerHTML = SHF_LISTINGS.map(l => `
      <div class="map-listing" data-id="${l.id}">
        <strong>${l.title}</strong>
        <div style="color:var(--primary); font-weight:700;">${SHF.formatPrice(l.price)}/mo</div>
        <div style="color:var(--text-muted); font-size:.85rem;"><i class="fas fa-location-dot"></i> ${l.city} • ${l.beds} bed</div>
        <a href="/detail.html?id=${l.id}" style="font-size:.85rem; color:var(--primary);">View details →</a>
      </div>`).join('');

    document.querySelectorAll('.map-listing').forEach(el => {
      el.addEventListener('click', (e) => {
        if (e.target.tagName === 'A') return;
        const id = el.dataset.id;
        const l = SHF_LISTINGS.find(x => String(x.id) === String(id));
        if (!l || l.lat == null) return;
        map.flyTo([l.lat, l.lng], 13);
        markers[id] && markers[id].openPopup();
      });
    });
  }
  renderMap();
  window.addEventListener('shf:listings-updated', renderMap);
</script>
</body>
</html>
