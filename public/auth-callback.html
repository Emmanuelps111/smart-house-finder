<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Signing you in… — MakaziLink</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;font-family:Inter,system-ui,sans-serif;">
  <i class="fas fa-spinner fa-spin" style="font-size:2rem;color:#3B82F6;"></i>
  <p id="msg" style="color:#374151;">Finishing sign-in…</p>
</div>
<script src="/js/cloud.js"></script>
<script>
(async function () {
  const msg = document.getElementById('msg');
  try {
    const sb = await window.SHFCloud.ready;
    // Wait a moment for session to hydrate from URL hash
    let attempts = 0;
    let session = null;
    while (attempts++ < 20) {
      const { data } = await sb.auth.getSession();
      if (data.session) { session = data.session; break; }
      await new Promise(r => setTimeout(r, 150));
    }
    if (!session) {
      msg.textContent = 'Sign-in failed. Redirecting to login…';
      setTimeout(() => location.href = '/login.html', 1200);
      return;
    }

    const uid = session.user.id;
    const meta = session.user.user_metadata || {};
    const email = (session.user.email || '').toLowerCase();

    // Check assigned role
    const { data: roles } = await sb.from('user_roles').select('role').eq('user_id', uid);
    const role = roles && roles.length ? roles[0].role : null;

    // First-time student confirmations: auto-approve profile + persist metadata.
    // Guarded to student role so landlords still go through OCR verification.
    if (role === 'student') {
      try {
        const { data: prof } = await sb.from('profiles')
          .select('verification_status, phone, university, student_reg_no')
          .eq('id', uid)
          .maybeSingle();
        if (!prof || prof.verification_status !== 'approved') {
          msg.textContent = 'Activating your student account…';
          const update = {
            verification_status: 'approved',
            verified_at: new Date().toISOString(),
          };
          if (!prof?.phone && meta.phone) update.phone = meta.phone;
          if (!prof?.university && meta.university) update.university = meta.university;
          if (!prof?.student_reg_no && meta.student_reg_no) update.student_reg_no = meta.student_reg_no;
          await sb.from('profiles').update(update).eq('id', uid);

          // Apply pending security question captured during signup (same device)
          try {
            const raw = localStorage.getItem('shf-pending-secq');
            if (raw) {
              const stash = JSON.parse(raw);
              if (stash && stash.email === email && stash.question && stash.answer) {
                await sb.rpc('set_security_question', {
                  _question: stash.question,
                  _answer: stash.answer,
                });
              }
              localStorage.removeItem('shf-pending-secq');
            }
          } catch (_) {}
        }
      } catch (e) { console.warn('student auto-approve skipped:', e); }
    }

    await window.SHFCloud.syncLocalUser(sb, session);

    if (!role) {
      // First-time OAuth user — pick role
      msg.textContent = 'Almost there — one quick step…';
      location.href = '/select-role.html';
      return;
    }
    msg.textContent = 'Welcome back!';
    const target = role === 'admin' ? '/admin'
      : role === 'landlord' ? '/dashboard.html'
      : '/listings.html';
    setTimeout(() => location.href = target, 400);
  } catch (err) {
    msg.textContent = err.message || 'Something went wrong.';
    setTimeout(() => location.href = '/login.html', 1500);
  }
})();
</script>
</body>
</html>
