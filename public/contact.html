<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Contact — Smart House Finder</title>
<meta name="description" content="Reach out to the Smart House Finder team — we're here to help." />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
<div id="header-mount"></div>

<section style="margin-top:var(--header-h); padding:4rem 0 2rem; background:linear-gradient(135deg,#3B82F6,#1E40AF); color:#fff; text-align:center;">
  <div class="container">
    <h1 style="color:#fff;">Get in touch</h1>
    <p style="color:rgba(255,255,255,.9);">We typically respond within 24 hours.</p>
  </div>
</section>

<section>
  <div class="container" style="display:grid; grid-template-columns:1fr 1fr; gap:3rem;">
    <div class="reveal">
      <h2>Contact details</h2>
      <p><i class="fas fa-envelope" style="color:var(--primary); width:24px;"></i> support@smarthousefinder.co.tz</p>
      <p><i class="fas fa-phone" style="color:var(--primary); width:24px;"></i> +255 717 656 841</p>
      <p><i class="fas fa-location-dot" style="color:var(--primary); width:24px;"></i> Mlimani City Tower, Sam Nujoma Rd, Dar es Salaam, Tanzania</p>
      <iframe title="Office location" style="width:100%; height:280px; border:0; border-radius:var(--radius); margin-top:1rem;" loading="lazy"
        src="https://www.openstreetmap.org/export/embed.html?bbox=39.20%2C-6.78%2C39.30%2C-6.74&layer=mapnik&marker=-6.7665%2C39.2418"></iframe>
    </div>
    <form id="contactForm" class="form reveal" novalidate>
      <div class="form-row"><label for="cf-name">Name</label><input id="cf-name" type="text" /><span class="error"></span></div>
      <div class="form-row"><label for="cf-email">Email</label><input id="cf-email" type="email" /><span class="error"></span></div>
      <div class="form-row"><label for="cf-msg">Message</label><textarea id="cf-msg"></textarea><span class="error"></span></div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">Send message <i class="fas fa-paper-plane"></i></button>
    </form>
  </div>
</section>

<div id="footer-mount"></div>
<script src="/js/cloud.js"></script>
<script src="/partials.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
