<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Reset Password — Smart House Finder</title>
<meta name="description" content="Set a new password for your Smart House Finder account." />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="/css/styles.css" />
<style>
  .pw-wrap { position: relative; }
  .pw-wrap input { padding-right: 2.6rem; }
  .pw-toggle {
    position: absolute; right: .6rem; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: var(--muted, #6b7280);
    padding: .3rem; font-size: 1rem;
  }
  .hint { font-size: .8rem; color: var(--muted, #6b7280); margin-top: .3rem; }
</style>
</head>
<body>
<div id="header-mount"></div>

<div class="container" style="max-width: 480px; margin: 3rem auto; padding: 0 1rem;">
  <div class="card" style="padding: 2rem;">
    <h1 style="margin-top:0;">Reset your password</h1>
    <p id="statusText" style="color: var(--muted,#6b7280); margin-bottom:1.25rem;">
      Verifying reset link…
    </p>

    <form id="resetForm" style="display:none;">
      <div class="form-row">
        <label for="pw1">New password</label>
        <div class="pw-wrap">
          <input id="pw1" type="password" minlength="8" required autocomplete="new-password" />
          <button type="button" class="pw-toggle" data-target="pw1" aria-label="Show password"><i class="fas fa-eye"></i></button>
        </div>
        <div class="hint">At least 8 characters.</div>
      </div>
      <div class="form-row" style="margin-top:1rem;">
        <label for="pw2">Confirm new password</label>
        <div class="pw-wrap">
          <input id="pw2" type="password" minlength="8" required autocomplete="new-password" />
          <button type="button" class="pw-toggle" data-target="pw2" aria-label="Show password"><i class="fas fa-eye"></i></button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn" style="width:100%; justify-content:center; margin-top:1.25rem;">
        Update password
      </button>
    </form>

    <p style="text-align:center; margin-top:1.25rem; font-size:.9rem;">
      <a href="/login.html">Back to sign in</a>
    </p>
  </div>
</div>

<div id="footer-mount"></div>
<script src="/js/cloud.js"></script>
<script src="/partials.js"></script>
<script>
  document.querySelectorAll('.pw-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = document.getElementById(btn.dataset.target);
      const icon = btn.querySelector('i');
      if (input.type === 'password') { input.type = 'text'; icon.className = 'fas fa-eye-slash'; }
      else { input.type = 'password'; icon.className = 'fas fa-eye'; }
    });
  });

  const statusText = document.getElementById('statusText');
  const form = document.getElementById('resetForm');
  const submitBtn = document.getElementById('submitBtn');

  (async function () {
    try {
      const sb = await window.SHFCloud.ready;

      // Supabase puts recovery tokens in the URL hash (#access_token=...&type=recovery)
      // The client auto-detects and creates a temporary session. We just wait a tick and check.
      await new Promise(r => setTimeout(r, 300));
      const { data: { session } } = await sb.auth.getSession();

      const hash = window.location.hash || '';
      const isRecovery = hash.includes('type=recovery') || !!session;

      if (!isRecovery || !session) {
        statusText.innerHTML = '<span style="color:#dc2626;"><i class="fas fa-triangle-exclamation"></i> This reset link is invalid or has expired. Please request a new one from the sign-in page.</span>';
        return;
      }

      statusText.textContent = 'Enter your new password below.';
      form.style.display = 'block';
    } catch (err) {
      console.error(err);
      statusText.innerHTML = '<span style="color:#dc2626;">Could not verify reset link. Please try again.</span>';
    }
  })();

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const pw1 = document.getElementById('pw1').value;
    const pw2 = document.getElementById('pw2').value;
    if (pw1.length < 8) return window.toast?.error?.('Password must be at least 8 characters.');
    if (pw1 !== pw2) return window.toast?.error?.('Passwords do not match.');

    submitBtn.disabled = true;
    submitBtn.textContent = 'Updating…';
    try {
      const sb = await window.SHFCloud.ready;
      const { error } = await sb.auth.updateUser({ password: pw1 });
      if (error) throw error;
      window.toast?.success?.('Password updated. Redirecting to sign in…');
      await sb.auth.signOut();
      setTimeout(() => { window.location.href = '/login.html'; }, 1200);
    } catch (err) {
      console.error(err);
      window.toast?.error?.(err.message || 'Could not update password. Please try again.');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Update password';
    }
  });
</script>
</body>
</html>
