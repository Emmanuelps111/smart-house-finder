<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Reset Password — Smart House Finder</title>
<meta name="description" content="Set a new password for your Smart House Finder account." />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
<div id="header-mount"></div>

<div class="auth-wrap">
  <div class="auth-card">
    <h2 style="text-align:center; margin-bottom:.5rem;">Set a new password</h2>
    <p style="text-align:center;">Enter and confirm your new password below.</p>

    <form id="resetForm" class="form" novalidate>
      <div class="form-row">
        <label for="np">New password</label>
        <input id="np" type="password" autocomplete="new-password" required />
        <span class="error"></span>
      </div>
      <div class="form-row">
        <label for="np2">Confirm password</label>
        <input id="np2" type="password" autocomplete="new-password" required />
        <span class="error"></span>
      </div>
      <button class="btn btn-primary" type="submit" id="rpBtn" style="width:100%; justify-content:center;">Update password</button>
      <p id="rpMsg" style="text-align:center; margin-top:1rem; font-size:.9rem; color: var(--text-muted);"></p>
    </form>
  </div>
</div>

<div id="footer-mount"></div>
<script src="/partials.js"></script>
<script src="/js/app.js"></script>
<script>
  function setError(id, msg) {
    const el = document.getElementById(id);
    if (!el) return;
    el.parentElement.querySelector('.error').textContent = msg || '';
  }

  function waitForAuth() {
    return new Promise((resolve) => {
      if (window.SHF_AUTH?.supabase) return resolve(window.SHF_AUTH);
      window.addEventListener('shf-auth-ready', () => resolve(window.SHF_AUTH), { once: true });
      let tries = 0;
      const t = setInterval(() => {
        if (window.SHF_AUTH?.supabase || ++tries > 50) { clearInterval(t); resolve(window.SHF_AUTH); }
      }, 100);
    });
  }

  document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    document.querySelectorAll('.error').forEach(el => el.textContent = '');
    const np = document.getElementById('np').value;
    const np2 = document.getElementById('np2').value;
    if (np.length < 6) { setError('np', 'Password must be at least 6 characters.'); return; }
    if (np !== np2) { setError('np2', 'Passwords do not match.'); return; }

    const btn = document.getElementById('rpBtn');
    btn.disabled = true; btn.textContent = 'Updating…';

    const a = await waitForAuth();
    const { error } = await a.supabase.auth.updateUser({ password: np });
    btn.disabled = false; btn.textContent = 'Update password';

    if (error) {
      document.getElementById('rpMsg').textContent = 'Error: ' + error.message;
      document.getElementById('rpMsg').style.color = '#ef4444';
      return;
    }
    document.getElementById('rpMsg').innerHTML = 'Password updated! <a href="/listings.html">Continue →</a>';
    document.getElementById('rpMsg').style.color = 'var(--primary)';
  });
</script>
</body>
</html>
